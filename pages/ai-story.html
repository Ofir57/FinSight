(function() {
 try {
 var t = localStorage.getItem('wl_theme');
 var isLight = t === 'light';
 document.documentElement.setAttribute('data-theme', isLight ? 'light' : 'dark');
 if (isLight) {
 document.documentElement.classList.add('light');
 // body class set on DOMContentLoaded
 if (document.body) document.body.classList.add('light');
 document.addEventListener('DOMContentLoaded', function() { document.body.classList.add('light'); });
 }
 } catch(e) {}
})();

 .story-section {

 .section-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 1px; }
 .section-content { flex: 1; }
 .section-label { font-size: 0.72rem; color: var(--color-text-secondary); font-weight: 600; text-transform: uppercase; margin-bottom: 3px; }

 /* Quick stats */
 .quick-stats {

 .quick-stat {
 background: var(--color-bg);

 .story-footer {
 padding: 14px 28px;
 border-top: 1px solid var(--color-border);

 /* Error */
 .error-box {

 }
 .key-row span { flex: 1; }
 .key-change-btn {

 color: var(--color-text-secondary);
 cursor: pointer;
 font-size: 0.78rem;
 }
 .key-change-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
 </style>

<script  src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js" integrity="sha384-ViccRjS0k/lvYsrtaKXk+ES61/4PAZlFI/mPHmLC1YWzK0AIbXbI5ZXDzcm3F8gH" crossorigin="anonymous"></script>
<script  src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js" integrity="sha384-+/4lqMnmLqwbdHXshvGDmBTeWlNoPRdjXi4ZsiBj10EhQXaTBe3RF5JZktdSjug6" crossorigin="anonymous"></script>
<script  src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js" integrity="sha384-lONBStWloxmdvtJe8gp4aEOmE9dluTdSdGA5pUHFYPBMJRUDDPSdbq32bb0Spi3v" crossorigin="anonymous"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/app.js"></script>
<script src="../js/profiles.js"></script>

<script src="../js/wize-pii.js"></script>
 <script src="../js/wizeai-sync.js"></script>
<script src="../js/i18n.js"></script>
<script>
const AI_CACHE_KEY = 'finance_ai_story_cache';
let currentUser = null;
const aiProxy = firebase.functions().httpsCallable('aiProxy');

function as(k) { return typeof I18n !== 'undefined' ? I18n.t('aiStory.' + k) : k; }

function init() {
 if (typeof I18n !== 'undefined') {
 I18n.init();
 document.title = as('pageTitle') + ' - FinSight';
 }
}

firebase.auth().onAuthStateChanged(user => {
 currentUser = user;
 document.getElementById('apiSetup').style.display = user ? 'none' : 'block';
 document.getElementById('mainUI').style.display = user ? 'block' : 'none';
 if (user) loadCachedStory();
});

function loadCachedStory() {
 try {
 const cached = JSON.parse(localStorage.getItem(AI_CACHE_KEY) || 'null');
 if (cached && cached.result) {
 renderStory(cached.result, cached.stats, cached.range, new Date(cached.ts));
 }
 } catch(e) {}
}

function gatherData(days) {
 const now = new Date();
 let from;
 if (days === 0) {
 from = new Date(now.getFullYear(), now.getMonth(), 1);
 } else {
 from = new Date(now.getTime() - days * 86400000);
 }

 const cc = Storage.getCreditCards();
 const expenses = (cc.expenses || []).filter(e => new Date(e.date) >= from);
 const budget = cc.budget || {};

 // Aggregate
 const totalILS = expenses
 .filter(e => (e.currency || 'ILS') === 'ILS')
 .reduce((s, e) => s + e.amount, 0);

 const byCategory = {};
 expenses.forEach(e => {
 const cat = e.category || 'other';
 byCategory[cat] = (byCategory[cat] || 0) + e.amount;
 });
 const topCat = Object.entries(byCategory).sort((a,b) => b[1]-a[1])[0];

 const sorted = [...expenses].sort((a,b) => b.amount - a.amount);
 const biggest = sorted[0];

 // Days left in month / budget
 const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
 const dayOfMonth = now.getDate();
 const daysLeft = daysInMonth - dayOfMonth;
 const monthTotal = (cc.expenses || [])
 .filter(e => {
 const d = new Date(e.date);
 return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear() && (e.currency||'ILS')==='ILS';
 })
 .reduce((s,e) => s+e.amount, 0);
 const budgetTotal = budget.total || 0;
 const budgetLeft = budgetTotal > 0 ? budgetTotal - monthTotal : null;

 // Country breakdown
 const countries = {};
 expenses.forEach(e => {
 const m = e.description && e.description.match(/\s+([A-Z]{2})$/);
 if (m) countries[m[1]] = (countries[m[1]]||0) + e.amount;
 else countries['IL'] = (countries['IL']||0) + e.amount;
 });

 return {
 from: from.toLocaleDateString('he-IL'),
 to: now.toLocaleDateString('he-IL'),
 count: expenses.length,
 totalILS,
 topCat: topCat ? { name: topCat[0], amount: topCat[1] } : null,
 biggest: biggest ? { desc: biggest.description, amount: biggest.amount, currency: biggest.currency||'ILS', date: biggest.date } : null,
 budgetLeft,
 budgetTotal,
 daysLeft,
 monthTotal,
 countries,
 expenses: sorted.slice(0, 15).map(e => ({
 date: e.date,
 desc: e.description,
 amount: e.amount,
 currency: e.currency || 'ILS',
 category: e.category
 }))
 };
}

function buildPrompt(data) {
 const langInstruction = as('promptInstruction');
 const lines = [
 `Dates: ${data.from} to ${data.to}`,
 `Transactions: ${data.count}`,
 `Total expenses (ILS): ₪${Math.round(data.totalILS).toLocaleString('en-US')}`,
 ];
 if (data.topCat) lines.push(`Top category: ${data.topCat.name} (₪${Math.round(data.topCat.amount).toLocaleString('en-US')})`);
 if (data.biggest) lines.push(`Largest expense: ${data.biggest.desc} — ${data.biggest.amount} ${data.biggest.currency} (${data.biggest.date})`);
 if (data.budgetLeft !== null) lines.push(`Monthly budget: ₪${data.budgetTotal.toLocaleString('en-US')} | Remaining: ₪${Math.round(data.budgetLeft).toLocaleString('en-US')} for ${data.daysLeft} days`);

 const countryList = Object.entries(data.countries).map(([c,v]) => `${c}: ₪${Math.round(v)}`).join(', ');
 if (countryList) lines.push(`By country: ${countryList}`);

 lines.push('', 'Top 15 transactions:');
 data.expenses.forEach(e => lines.push(` ${e.date} | ${e.desc} | ${e.amount} ${e.currency} | ${e.category||''}`));

 return `You are a smart personal financial advisor. You received a user's expense data.

${lines.join('\n')}

${langInstruction}
Reply in JSON only (no markdown, no text outside JSON):
{
 "headline": "Short, engaging title for this period (up to 8 words)",
 "story": "2-3 sentences describing expenses in a personal, warm, specific way with numbers and names.",
 "highlight": "One interesting insight you found — something the user may not have noticed.",
 "tip": "One practical tip relevant to this specific data.",
 "mood": "exactly one of: excellent / good / warning / critical"
}`;
}

async function generateStory() {
 if (!currentUser) {
 showError('יש להתחבר לחשבון.');
 return;
 }

 const days = parseInt(document.getElementById('rangeSelect').value);
 const data = gatherData(days);

 if (data.count === 0) {
 showError(as('noTransactions'));
 return;
 }

 setLoading(true);
 hideError();

 try {
 const prompt = buildPrompt(data);
 // PII scrubbed (wize-pii.js, contextual) — recursively strips identity values
 // from the messages payload while keeping financial labels for answer accuracy.
 const _strip = (window.WizePII?.stripIdentity) || (x => x);
 const res = await aiProxy({
 messages: _strip([{ role: 'user', parts: [{ text: prompt }] }]),
 maxTokens: 600,
 });

 const raw = res.data.text || '';
 const cleaned = raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
 const result = JSON.parse(cleaned);

 localStorage.setItem(AI_CACHE_KEY, JSON.stringify({ result, stats: data, range: days, ts: new Date().toISOString() }));
 renderStory(result, data, days, new Date());

 } catch(e) {
 const msg = e.code === 'functions/resource-exhausted'
 ? (e.message || 'הגעת למגבלה היומית.')
 : (as('errorPrefix') + (e.message || e));
 showError(msg);
 } finally {
 setLoading(false);
 }
}

function renderStory(result, data, days, ts) {
 const moodMap = {
 excellent: { text: as('moodExcellent'), cls: 'mood-excellent' },
 good: { text: as('moodGood'), cls: 'mood-good' },
 warning: { text: as('moodWarning'), cls: 'mood-warning' },
 critical: { text: as('moodCritical'), cls: 'mood-critical' }
 };
 const mood = moodMap[result.mood] || moodMap.good;

 document.getElementById('weekLabel').textContent = days === 0 ? as('currentMonth') : `${days} · ${data.from} – ${data.to}`;
 document.getElementById('storyHeadline').textContent = result.headline || '';

 const badge = document.getElementById('moodBadge');
 badge.textContent = mood.text;
 badge.className = 'mood-badge ' + mood.cls;

 // Quick stats
 const qs = document.getElementById('quickStats');
 const budgetPct = data.budgetTotal > 0 ? Math.round(data.monthTotal / data.budgetTotal * 100) : null;
 qs.innerHTML = `
 <div class="quick-stat">
 <div class="qs-label">${as('statTotal')}</div>
 <div class="qs-value">₪${Math.round(data.totalILS).toLocaleString('he-IL')}</div>
 </div>
 <div class="quick-stat">
 <div class="qs-label">${as('statTransactions')}</div>
 <div class="qs-value">${data.count}</div>
 </div>
 ${budgetPct !== null ? `
 <div class="quick-stat">
 <div class="qs-label">${as('statBudget')}</div>
 <div class="qs-value" style="color:${budgetPct>90?'var(--color-negative)':budgetPct>70?'#f59e0b':'var(--color-positive)'}">${budgetPct}%</div>
 </div>` : `
 <div class="quick-stat">
 <div class="qs-label">${as('statAvgDay')}</div>
 <div class="qs-value">₪${data.count > 0 ? Math.round(data.totalILS / Math.max(days||30,1)).toLocaleString('he-IL') : 0}</div>
 </div>`}
 `;

 document.getElementById('storyMain').textContent = result.story || '';

 const sections = document.getElementById('storySections');
 const budgetText = data.budgetLeft !== null
 ? (data.budgetLeft >= 0
 ? as('budgetRemaining').replace('{left}', `₪${Math.round(data.budgetLeft).toLocaleString('he-IL')}`).replace('{total}', `₪${data.budgetTotal.toLocaleString('he-IL')}`).replace('{days}', data.daysLeft)
 : as('budgetOver').replace('{amount}', `₪${Math.round(Math.abs(data.budgetLeft)).toLocaleString('he-IL')}`))
 : '';
 const _esc = (s) => (s == null ? '' : String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])));
 sections.innerHTML = `
 <div class="story-section">
 <div class="section-icon">💡</div>
 <div class="section-content">
 <div class="section-label">${as('sectionInsight')}</div>
 <div class="section-text">${_esc(result.highlight || '')}</div>
 </div>
 </div>
 <div class="story-section">
 <div class="section-icon">🎯</div>
 <div class="section-content">
 <div class="section-label">${as('sectionTip')}</div>
 <div class="section-text">${_esc(result.tip || '')}</div>
 </div>
 </div>
 ${data.budgetLeft !== null ? `
 <div class="story-section">
 <div class="section-icon">${data.budgetLeft < 0 ? '🚨' : data.budgetLeft < data.budgetTotal * 0.1 ? '⚠️' : '📊'}</div>
 <div class="section-content">
 <div class="section-label">${as('sectionBudget')}</div>
 <div class="section-text">${budgetText}</div>
 </div>
 </div>` : ''}
 `;

 const locale = I18n.currentLanguage === 'he' ? 'he-IL' : I18n.currentLanguage === 'pt' ? 'pt-BR' : 'en-US';
 document.getElementById('storyTimestamp').textContent = as('updatedLabel') + ts.toLocaleString(locale, {hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'});

 document.getElementById('storyCard').style.display = 'block';
}

function setLoading(on) {
 document.getElementById('loadingWrap').style.display = on ? 'block' : 'none';
 document.getElementById('generateBtn').disabled = on;
 document.getElementById('btnText').textContent = on ? as('generating') : as('generateBtn');
 if (on) document.getElementById('storyCard').style.display = 'none';
}

function showError(msg) {
 const el = document.getElementById('errorBox');
 el.textContent = msg;
 el.style.display = 'block';
}
function hideError() { document.getElementById('errorBox').style.display = 'none'; }

init();
</script>
<script src="../js/wl-common-i18n.js?v=2" defer></script>
<script src="../js/wl-text-i18n.js?v=2" defer></script>
