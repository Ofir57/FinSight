 .btn-primary:hover { background: #7c3aed; }

 /* Summary bar */
 .income-summary-bar {

 /* Income table */

 <script>
 // ── Helpers ──────────────────────────────────────────────────────────────

 const STORAGE_KEY = 'finance_income';

 function TYPE_LABELS() {
 return {
 salary: I18n.t('income.typeSalary'),
 rental: I18n.t('income.typeRental'),
 dividend: I18n.t('income.typeDividend'),
 business: I18n.t('income.typeBusiness'),
 other: I18n.t('income.typeOther'),
 };
 }

 function FREQ_LABELS() {
 return {
 monthly: I18n.t('income.freqMonthly'),
 annual: I18n.t('income.freqAnnual'),
 one_time: I18n.t('income.freqOneTime'),
 };
 }

 function monthlyEquiv(entry) {
 if (entry.frequency === 'annual') return entry.amount / 12;
 if (entry.frequency === 'one_time') return 0;
 return entry.amount; // monthly
 }

 function formatCurrency(n) {
 return '₪' + Math.round(n).toLocaleString('he-IL');
 }

 function formatDate(dateStr) {
 if (!dateStr) return '—';
 const d = new Date(dateStr);
 if (isNaN(d)) return dateStr;
 return d.toLocaleDateString('he-IL');
 }

 function generateId() {
 return Date.now().toString(36) + Math.random().toString(36).slice(2);
 }

 function todayISO() {
 return new Date().toISOString().split('T')[0];
 }

 function currentMonthStr() {
 const now = new Date();
 const m = String(now.getMonth() + 1).padStart(2, '0');
 return `${now.getFullYear()}-${m}`;
 }

 // ── Data ─────────────────────────────────────────────────────────────────

 function loadIncome() {
 return Storage.get(STORAGE_KEY) || [];
 }

 function saveIncomeList(arr) {
 Storage.set(STORAGE_KEY, arr);
 if(typeof WizeAISync!=='undefined') WizeAISync.scheduleSync();
 }

 // ── Summary ───────────────────────────────────────────────────────────────

 function renderSummary(entries) {
 const totalIncome = entries.reduce((s, e) => s + monthlyEquiv(e), 0);

 const monthStr = currentMonthStr();
 const totalExpenses = Storage.getTotalCreditExpenses(monthStr);

 const net = totalIncome - totalExpenses;

 document.getElementById('totalMonthlyIncome').textContent = formatCurrency(totalIncome);
 document.getElementById('totalMonthlyExpenses').textContent = formatCurrency(totalExpenses);

 const netEl = document.getElementById('netCashflow');
 netEl.textContent = formatCurrency(net);
 netEl.className = 'stat-value ' + (net >= 0 ? 'positive' : 'negative');
 }

 // ── Table ─────────────────────────────────────────────────────────────────

 function renderTable(entries) {
 const tbody = document.getElementById('incomeTableBody');

 if (!entries || entries.length === 0) {
 tbody.innerHTML = `<tr><td colspan="6">
 <div class="empty-state">
 <span class="empty-icon">💰</span>
 <p>${I18n.t('income.emptyMsg')}</p>
 <small>${I18n.t('income.emptyHint')}</small>
 </div>
 </td></tr>`;
 return;
 }

 const typeLabels = TYPE_LABELS();
 const freqLabels = FREQ_LABELS();

 tbody.innerHTML = entries.map(e => {
 const equiv = monthlyEquiv(e);
 const isOneTime = e.frequency === 'one_time';
 const amountClass = isOneTime ? 'amount-cell one-time' : 'amount-cell';

 let amountDisplay = formatCurrency(e.amount);
 let equivNote = '';
 if (e.frequency === 'annual') {
 equivNote = `<span class="monthly-equiv">(${formatCurrency(equiv)}${I18n.t('income.monthlyNote')})</span>`;
 } else if (e.frequency === 'one_time') {
 equivNote = `<span class="monthly-equiv">${I18n.t('income.notCountedMonthly')}</span>`;
 }

 return `<tr>
 <td><strong>${escapeHtml(e.name)}</strong>${e.notes ? `<br><small style="color:#94a3b8;font-size:0.75rem">${escapeHtml(e.notes)}</small>` : ''}</td>
 <td><span class="type-badge">${escapeHtml(typeLabels[e.type] || e.type)}</span></td>
 <td class="${amountClass}">${amountDisplay}${equivNote}</td>
 <td><span class="freq-badge">${escapeHtml(freqLabels[e.frequency] || e.frequency)}</span></td>
 <td style="white-space:nowrap">${escapeHtml(formatDate(e.date))}</td>
 <td style="white-space:nowrap">
 <button class="action-btn" onclick="openEditModal('${escapeHtml(e.id).replace(/'/g, '&#39;')}')" title="עריכה">✏️</button>
 <button class="action-btn delete" onclick="deleteEntry('${escapeHtml(e.id).replace(/'/g, '&#39;')}')" title="מחיקה">🗑️</button>
 </td>
 </tr>`;
 }).join('');
 }

 function escapeHtml(str) {
 if (str == null) return '';
 return String(str)
 .replace(/&/g, '&amp;')
 .replace(/</g, '&lt;')
 .replace(/>/g, '&gt;')
 .replace(/"/g, '&quot;')
 .replace(/'/g, '&#39;');
 }

 // ── Chart ─────────────────────────────────────────────────────────────────

 let incomeChart = null;

 function renderChart(entries) {
 const ctx = document.getElementById('incomeExpensesChart').getContext('2d');

 const monthlyIncome = entries.reduce((s, e) => s + monthlyEquiv(e), 0);

 // Build last 6 months labels + expense data
 const labels = [];
 const incomeData = [];
 const expensesData = [];

 const now = new Date();
 for (let i = 5; i >= 0; i--) {
 const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
 const year = d.getFullYear();
 const month = String(d.getMonth() + 1).padStart(2, '0');
 const monthStr = `${year}-${month}`;

 // Hebrew month label
 const label = d.toLocaleDateString('he-IL', { month: 'short', year: '2-digit' });
 labels.push(label);

 incomeData.push(Math.round(monthlyIncome));

 const exp = Storage.getTotalCreditExpenses(monthStr);
 expensesData.push(Math.round(exp));
 }

 if (incomeChart) {
 incomeChart.destroy();
 }

 incomeChart = new Chart(ctx, {
 type: 'bar',
 data: {
 labels,
 datasets: [
 {
 label: I18n.t('income.chartIncome'),
 data: incomeData,
 backgroundColor: 'rgba(16, 185, 129, 0.7)',
 borderColor: '#10b981',
 borderWidth: 1,
 borderRadius: 6,
 },
 {
 label: I18n.t('income.chartExpenses'),
 data: expensesData,
 backgroundColor: 'rgba(139, 92, 246, 0.7)',
 borderColor: '#8b5cf6',
 borderWidth: 1,
 borderRadius: 6,
 },
 ],
 },
 options: {
 responsive: true,
 maintainAspectRatio: false,
 plugins: {
 legend: {
 labels: {
 color: '#cbd5e1',
 font: { family: 'inherit', size: 13 },
 },
 },
 tooltip: {
 rtl: true,
 callbacks: {
 label: ctx => ` ${ctx.dataset.label}: ₪${ctx.parsed.y.toLocaleString('he-IL')}`,
 },
 },
 },
 scales: {
 x: {
 ticks: { color: '#94a3b8', font: { family: 'inherit' } },
 grid: { color: 'rgba(255,255,255,0.05)' },
 },
 y: {
 beginAtZero: true,
 ticks: {
 color: '#94a3b8',
 font: { family: 'inherit' },
 callback: v => '₪' + v.toLocaleString('he-IL'),
 },
 grid: { color: 'rgba(255,255,255,0.05)' },
 },
 },
 },
 });
 }

 // ── Render all ────────────────────────────────────────────────────────────

 function renderAll() {
 const entries = loadIncome();
 renderSummary(entries);
 renderTable(entries);
 renderChart(entries);
 }

 // ── Modal ─────────────────────────────────────────────────────────────────

 let editingId = null;

 function openAddModal(presetType) {
 editingId = null;
 document.getElementById('modalTitle').textContent = I18n.t('income.modalAdd');
 document.getElementById('incomeName').value = '';
 document.getElementById('incomeAmount').value = '';
 document.getElementById('incomeType').value = presetType || 'salary';
 document.getElementById('incomeFrequency').value = 'monthly';
 document.getElementById('incomeDate').value = todayISO();
 document.getElementById('incomeNotes').value = '';
 document.getElementById('incomeModal').style.display = 'flex';
 document.getElementById('incomeName').focus();
 }

 function openEditModal(id) {
 const entries = loadIncome();
 const entry = entries.find(e => e.id === id);
 if (!entry) return;

 editingId = id;
 document.getElementById('modalTitle').textContent = I18n.t('income.modalEdit');
 document.getElementById('incomeName').value = entry.name || '';
 document.getElementById('incomeAmount').value = entry.amount || '';
 document.getElementById('incomeType').value = entry.type || 'salary';
 document.getElementById('incomeFrequency').value = entry.frequency || 'monthly';
 document.getElementById('incomeDate').value = entry.date || todayISO();
 document.getElementById('incomeNotes').value = entry.notes || '';
 document.getElementById('incomeModal').style.display = 'flex';
 document.getElementById('incomeName').focus();
 }

 function closeModal() {
 document.getElementById('incomeModal').style.display = 'none';
 editingId = null;
 }

 function handleModalOverlayClick(event) {
 if (event.target === document.getElementById('incomeModal')) {
 closeModal();
 }
 }

 function saveIncome() {
 const name = document.getElementById('incomeName').value.trim();
 const amount = parseFloat(document.getElementById('incomeAmount').value);
 const type = document.getElementById('incomeType').value;
 const frequency = document.getElementById('incomeFrequency').value;
 const date = document.getElementById('incomeDate').value;
 const notes = document.getElementById('incomeNotes').value.trim();

 if (!name) {
 document.getElementById('incomeName').focus();
 return;
 }
 if (isNaN(amount) || amount < 0) {
 document.getElementById('incomeAmount').focus();
 return;
 }
 if (!date) {
 document.getElementById('incomeDate').focus();
 return;
 }

 const entries = loadIncome();

 if (editingId) {
 const idx = entries.findIndex(e => e.id === editingId);
 if (idx !== -1) {
 entries[idx] = { ...entries[idx], name, amount, type, frequency, date, notes };
 }
 } else {
 entries.push({ id: generateId(), name, amount, type, frequency, date, notes });
 }

 saveIncomeList(entries);
 closeModal();
 renderAll();
 }

 function deleteEntry(id) {
 const entries = loadIncome();
 const entry = entries.find(e => e.id === id);
 if (!entry) return;
 if (!confirm(`${I18n.t('income.deleteConfirm')} "${entry.name}"?`)) return;
 saveIncomeList(entries.filter(e => e.id !== id));
 renderAll();
 }

 // ── Keyboard shortcuts ────────────────────────────────────────────────────

 document.addEventListener('keydown', e => {
 if (e.key === 'Escape') closeModal();
 });

 // ── Init ──────────────────────────────────────────────────────────────────

 document.addEventListener('DOMContentLoaded', () => {
 if (typeof I18n !== 'undefined') I18n.init();
 renderAll();
 });
 </script>
