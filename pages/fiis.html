<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<script>
(function() {
 try {
 var t = localStorage.getItem('wl_theme');
 var isLight = t === 'light';
 document.documentElement.setAttribute('data-theme', isLight ? 'light' : 'dark');
 if (isLight) {
 document.documentElement.classList.add('light');
 // body class set on DOMContentLoaded
 if (document.body) document.body.classList.add('light');
 document.addEventListener('DOMContentLoaded', function() { document.body.classList.add('light'); });
 }
 } catch(e) {}
})();
</script>
<meta charset="UTF-8">
 <meta name="view-transition" content="same-origin">
 <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="../img/logo.svg">
<meta name="theme-color" content="#6366f1">
<title>FIIs – WizeMoney</title>
<link rel="stylesheet" href="../css/app.css">
<meta name="wl-sentry-dsn" content="">
<meta name="wl-sentry-app" content="wizemoney">
<script src="/js/wize-sentry.js" defer></script>
</head>
<body>
<div class="app-container">
<aside class="sidebar"></aside>
<main class="main-content">

<div style="padding:24px 24px 16px;border-bottom:1px solid var(--color-border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
 <div>
 <h1 style="font-size:1.4rem;font-weight:700;margin:0;">🏢 FIIs — Fundos Imobiliários</h1>
 <p style="color:var(--color-text-secondary);font-size:0.82rem;margin:3px 0 0;">Carteira de FIIs com renda mensal e dividend yield</p>
 </div>
 <button onclick="openModal()" style="padding:9px 18px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:10px;color:#fff;font-weight:600;cursor:pointer;font-size:0.88rem;">+ Adicionar FII</button>
</div>

<!-- Summary -->
<div id="summaryCards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;padding:20px 24px 0;"></div>

<!-- Table -->
<div style="padding:20px 24px;">
 <div style="overflow-x:auto;border-radius:12px;border:1px solid var(--color-border);">
 <table style="width:100%;border-collapse:collapse;font-size:0.88rem;">
 <thead>
 <tr style="background:var(--color-bg-hover);">
 <th style="padding:12px 14px;text-align:left;font-weight:600;color:var(--color-text-secondary);">FII</th>
 <th style="padding:12px 14px;text-align:right;font-weight:600;color:var(--color-text-secondary);">Cotas</th>
 <th style="padding:12px 14px;text-align:right;font-weight:600;color:var(--color-text-secondary);">PM</th>
 <th style="padding:12px 14px;text-align:right;font-weight:600;color:var(--color-text-secondary);">Cotação</th>
 <th style="padding:12px 14px;text-align:right;font-weight:600;color:var(--color-text-secondary);">Valor Total</th>
 <th style="padding:12px 14px;text-align:right;font-weight:600;color:var(--color-text-secondary);">DY Anual</th>
 <th style="padding:12px 14px;text-align:right;font-weight:600;color:var(--color-text-secondary);">Renda/mês</th>
 <th style="padding:12px 14px;text-align:right;font-weight:600;color:var(--color-text-secondary);">Resultado</th>
 <th style="padding:12px 14px;"></th>
 </tr>
 </thead>
 <tbody id="holdingsBody">
 <tr id="emptyRow"><td colspan="9" style="padding:40px;text-align:center;color:var(--color-text-secondary);">Nenhum FII cadastrado.</td></tr>
 </tbody>
 </table>
 </div>
</div>

<!-- Modal -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;">
 <div style="background:var(--color-bg-card);border-radius:16px;padding:28px;width:min(460px,95vw);border:1px solid var(--color-border);">
 <h2 style="margin:0 0 20px;font-size:1.1rem;">Adicionar FII</h2>
 <div style="display:grid;gap:14px;">
 <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
 <div>
 <label style="font-size:0.82rem;color:var(--color-text-secondary);display:block;margin-bottom:4px;">Ticker (ex: MXRF11)</label>
 <input id="mTicker" type="text" placeholder="MXRF11" style="width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--color-border);background:var(--color-bg-hover);color:var(--color-text-primary);font-size:0.9rem;box-sizing:border-box;text-transform:uppercase;">
 </div>
 <div>
 <label style="font-size:0.82rem;color:var(--color-text-secondary);display:block;margin-bottom:4px;">Nome (opcional)</label>
 <input id="mName" type="text" placeholder="Maxi Renda" style="width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--color-border);background:var(--color-bg-hover);color:var(--color-text-primary);font-size:0.9rem;box-sizing:border-box;">
 </div>
 </div>
 <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
 <div>
 <label style="font-size:0.82rem;color:var(--color-text-secondary);display:block;margin-bottom:4px;">Qtd. Cotas</label>
 <input id="mQty" type="number" min="1" placeholder="100" style="width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--color-border);background:var(--color-bg-hover);color:var(--color-text-primary);font-size:0.9rem;box-sizing:border-box;">
 </div>
 <div>
 <label style="font-size:0.82rem;color:var(--color-text-secondary);display:block;margin-bottom:4px;">Preço Médio (R$)</label>
 <input id="mAvgPrice" type="number" step="0.01" placeholder="10.50" style="width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--color-border);background:var(--color-bg-hover);color:var(--color-text-primary);font-size:0.9rem;box-sizing:border-box;">
 </div>
 <div>
 <label style="font-size:0.82rem;color:var(--color-text-secondary);display:block;margin-bottom:4px;">Cotação Atual (R$)</label>
 <input id="mCurrPrice" type="number" step="0.01" placeholder="11.20" style="width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--color-border);background:var(--color-bg-hover);color:var(--color-text-primary);font-size:0.9rem;box-sizing:border-box;">
 </div>
 </div>
 <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
 <div>
 <label style="font-size:0.82rem;color:var(--color-text-secondary);display:block;margin-bottom:4px;">Dividendo Mensal/Cota (R$)</label>
 <input id="mDividend" type="number" step="0.0001" placeholder="0.09" style="width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--color-border);background:var(--color-bg-hover);color:var(--color-text-primary);font-size:0.9rem;box-sizing:border-box;">
 </div>
 <div>
 <label style="font-size:0.82rem;color:var(--color-text-secondary);display:block;margin-bottom:4px;">Setor</label>
 <select id="mSector" style="width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--color-border);background:var(--color-bg-hover);color:var(--color-text-primary);font-size:0.9rem;">
 <option value="papel">Papel / CRI</option>
 <option value="lajes">Lajes Corporativas</option>
 <option value="logistica">Logística</option>
 <option value="shoppings">Shoppings</option>
 <option value="residencial">Residencial</option>
 <option value="hibrido">Híbrido</option>
 <option value="outro">Outro</option>
 </select>
 </div>
 </div>
 </div>
 <div style="display:flex;gap:10px;margin-top:20px;justify-content:flex-end;">
 <button onclick="closeModal()" style="padding:9px 18px;border-radius:9px;border:1px solid var(--color-border);background:none;color:var(--color-text-secondary);cursor:pointer;">Cancelar</button>
 <button onclick="saveHolding()" style="padding:9px 20px;border-radius:9px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:#fff;font-weight:600;cursor:pointer;">Salvar</button>
 </div>
 </div>
</div>

<script  src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js" integrity="sha384-ViccRjS0k/lvYsrtaKXk+ES61/4PAZlFI/mPHmLC1YWzK0AIbXbI5ZXDzcm3F8gH" crossorigin="anonymous"></script>
<script  src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js" integrity="sha384-+/4lqMnmLqwbdHXshvGDmBTeWlNoPRdjXi4ZsiBj10EhQXaTBe3RF5JZktdSjug6" crossorigin="anonymous"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/idb.js"></script>
<script src="../js/sidebar.js"></script>
 <script src="../js/app.js"></script>
<script src="../js/storage.js"></script>
 <script src="../js/wizeai-sync.js"></script>
<script src="../js/i18n.js"></script>
<script>
const SK = 'finance_fiis';
function load() { return Storage.get(SK) || []; }
function save(d) { Storage.set(SK, d); }
function fmtBRL(v) { return 'R$ ' + Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function renderAll() {
 const holdings = load();
 const tbody = document.getElementById('holdingsBody');
 const empty = document.getElementById('emptyRow');
 let totalInv=0, totalCurr=0, totalIncome=0;

 tbody.querySelectorAll('tr:not(#emptyRow)').forEach(r=>r.remove());
 empty.style.display = holdings.length ? 'none' : '';

 holdings.forEach((h,i) => {
 const curr = (h.currPrice || h.avgPrice) * h.qty;
 const inv = h.avgPrice * h.qty;
 const gain = curr - inv;
 const income = (h.dividend || 0) * h.qty;
 const dy = h.currPrice ? (h.dividend*12/h.currPrice*100).toFixed(2) : '—';
 totalInv += inv; totalCurr += curr; totalIncome += income;
 const isPos = gain >= 0;
 const tr = document.createElement('tr');
 tr.style.borderTop = '1px solid var(--color-border)';
 tr.innerHTML = `
 <td style="padding:12px 14px;"><strong>${h.ticker}</strong>${h.name?'<br><small style="color:var(--color-text-secondary)">'+h.name+'</small>':''}<br><small style="color:var(--color-text-secondary);font-size:0.75rem;">${h.sector||''}</small></td>
 <td style="padding:12px 14px;text-align:right;">${h.qty}</td>
 <td style="padding:12px 14px;text-align:right;">${fmtBRL(h.avgPrice)}</td>
 <td style="padding:12px 14px;text-align:right;">${h.currPrice?fmtBRL(h.currPrice):'—'}</td>
 <td style="padding:12px 14px;text-align:right;font-weight:600;">${fmtBRL(curr)}</td>
 <td style="padding:12px 14px;text-align:right;color:#10b981;">${dy}%</td>
 <td style="padding:12px 14px;text-align:right;color:#10b981;">${income?fmtBRL(income):'—'}</td>
 <td style="padding:12px 14px;text-align:right;color:${isPos?'#10b981':'#ef4444'};">${isPos?'+':''}${fmtBRL(gain)}</td>
 <td style="padding:12px 14px;"><button onclick="removeHolding(${i})" style="background:none;border:none;color:#ef4444;cursor:pointer;">✕</button></td>`;
 tbody.appendChild(tr);
 });

 const dyTotal = totalCurr ? (totalIncome*12/totalCurr*100).toFixed(2) : '0';
 document.getElementById('summaryCards').innerHTML = `
 ${card('💰','Investido',fmtBRL(totalInv),'')}
 ${card('📈','Patrimônio',fmtBRL(totalCurr),'')}
 ${card('💚','Renda/mês',fmtBRL(totalIncome),'#10b981')}
 ${card('🎯','DY Médio',dyTotal+'%','#10b981')}`;
}

function card(i,l,v,c){return`<div style="padding:16px;background:var(--color-bg-card);border:1px solid var(--color-border);border-radius:12px;"><div style="font-size:0.78rem;color:var(--color-text-secondary);margin-bottom:4px;">${i} ${l}</div><div style="font-size:1.2rem;font-weight:700;${c?'color:'+c:''}">${v}</div></div>`;}

function openModal(){document.getElementById('modal').style.display='flex';}
function closeModal(){document.getElementById('modal').style.display='none';}

function saveHolding() {
 const ticker = document.getElementById('mTicker').value.trim().toUpperCase();
 const qty = parseInt(document.getElementById('mQty').value);
 const avgPrice = parseFloat(document.getElementById('mAvgPrice').value);
 const currPrice = parseFloat(document.getElementById('mCurrPrice').value) || avgPrice;
 const dividend = parseFloat(document.getElementById('mDividend').value) || 0;
 const name = document.getElementById('mName').value.trim();
 const sector = document.getElementById('mSector').value;
 if (!ticker || !qty || !avgPrice) { alert('Preencha ticker, quantidade e preço médio.'); return; }
 const holdings = load();
 holdings.push({ticker,name,qty,avgPrice,currPrice,dividend,sector});
 save(holdings); closeModal(); renderAll();
 ['mTicker','mName','mQty','mAvgPrice','mCurrPrice','mDividend'].forEach(id=>document.getElementById(id).value='');
}

function removeHolding(i){if(!confirm('Remover?'))return;const h=load();h.splice(i,1);save(h);renderAll();}
document.addEventListener('DOMContentLoaded',renderAll);
</script>
</main></div>
<script src="../js/wl-common-i18n.js?v=2" defer></script>
<script src="../js/wl-text-i18n.js?v=2" defer></script>
</body></html>
