// ─── Market Data via Firebase Function (server-side, Firestore cached) ──────
const marketDataFn = firebase.functions().httpsCallable('marketData');
const _mdLocalCache = {}; // in-memory cache within this session

async function fetchMarketData(ticker) {
 const key = ticker.toUpperCase();
 // Check in-memory cache (TTL: 1h)
 if (_mdLocalCache[key] && Date.now() - _mdLocalCache[key].ts < 3600000) {
 return _mdLocalCache[key].data;
 }
 try {
 const res = await marketDataFn({ ticker: key });
 const d = res.data;
 if (d?.price) {
 _mdLocalCache[key] = { ts: Date.now(), data: d };
 return d;
 }
 } catch(e) { console.warn('marketData failed for', key, e.message); }
 return null;
}

// Extract ticker symbols mentioned in user message
function extractTickers(text) {
 const matches = text.match(/\b([A-Z]{1,5}(?:\.[A-Z]{1,2})?)\b/g) || [];
 const skip = new Set(['AI','ETF','RSI','MACD','SMA','EMA','IPO','CEO','PE','EPS','GDP','CPI','FED','ECB','USA','EU','US','OK','PM','AM','MA','BB','IV']);
 return [...new Set(matches.filter(m => !skip.has(m) && m.length >= 2))].slice(0, 3);
}

function formatMarketContext(d) {
 if (!d?.price) return '';
 const isHe = getLang() === 'he';
 const lines = [`\n=== ${isHe ? 'נתוני שוק חיים' : 'Live Market Data'}: ${d.name || d.ticker} (${d.ticker}) ===`];

 lines.push(`${isHe ? 'מחיר' : 'Price'}: $${d.price} ${d.changePct >= 0 ? '+' : ''}${d.changePct}% ${isHe ? 'היום' : 'today'}`);
 if (d.high) lines.push(`${isHe ? 'טווח יומי' : 'Range'}: $${d.low}–$${d.high}${d.volume ? ' | Vol: ' + d.volume : ''}`);

 // Fundamentals
 if (d.fundamentals) {
 const f = d.fundamentals;
 lines.push('\n' + (isHe ? 'פונדמנטאלי:' : 'Fundamentals:'));
 if (f.marketCap) lines.push(` Market Cap: $${(f.marketCap / 1000).toFixed(1)}B`);
 if (f.pe) lines.push(` P/E: ${f.pe}`);
 if (f.eps) lines.push(` EPS: $${f.eps}`);
 if (f.revenueGrowth)lines.push(` ${isHe ? 'צמיחת הכנסות' : 'Revenue Growth'} (YoY): ${f.revenueGrowth}`);
 if (f.grossMargin) lines.push(` ${isHe ? 'מרווח גולמי' : 'Gross Margin'}: ${f.grossMargin}`);
 if (f.netMargin) lines.push(` ${isHe ? 'מרווח נקי' : 'Net Margin'}: ${f.netMargin}`);
 if (f.roe) lines.push(` ROE: ${f.roe}`);
 if (f.debtEquity) lines.push(` Debt/Equity: ${f.debtEquity}`);
 if (f.beta) lines.push(` Beta: ${f.beta}`);
 if (f.dividendYield)lines.push(` ${isHe ? 'תשואת דיבידנד' : 'Dividend Yield'}: ${f.dividendYield}`);
 if (f.week52High) lines.push(` 52W: $${f.week52Low}–$${f.week52High}`);
 }

 // Technical analysis
 const ta = [];
 if (d.rsi != null) {
 const r = parseFloat(d.rsi);
 const tag = r > 70 ? (isHe ? 'קנוי יתר ⚠️' : 'Overbought ⚠️') : r < 30 ? (isHe ? 'מכור יתר ⚠️' : 'Oversold ⚠️') : (isHe ? 'נייטרלי' : 'Neutral');
 ta.push(`RSI(14): ${d.rsi} (${tag})`);
 }
 if (d.macd != null) {
 const bull = parseFloat(d.macdHist) > 0;
 ta.push(`MACD: ${d.macd} | Signal: ${d.macdSig} | Hist: ${d.macdHist} → ${bull ? (isHe ? 'מומנטום חיובי 📈' : 'Bullish 📈') : (isHe ? 'מומנטום שלילי 📉' : 'Bearish 📉')}`);
 }
 if (d.sma50 && d.price) {
 const abv = parseFloat(d.price) > parseFloat(d.sma50);
 ta.push(`SMA50: $${d.sma50} → ${isHe ? 'מחיר' : 'Price'} ${abv ? (isHe ? 'מעל' : 'above') : (isHe ? 'מתחת' : 'below')} SMA50`);
 }
 if (d.sma200 && d.price && d.sma50) {
 const gc = parseFloat(d.sma50) > parseFloat(d.sma200);
 ta.push(`SMA200: $${d.sma200} → ${gc ? 'Golden Cross ✨' : (isHe ? 'Death Cross ⚠️' : 'Death Cross ⚠️')}`);
 }
 if (ta.length) lines.push('\n' + (isHe ? 'ניתוח טכני:' : 'Technical Analysis:'), ...ta.map(l => ' ' + l));

 // Peers
 if (d.peers?.length) {
 lines.push(`\n${isHe ? 'מתחרים באותו סקטור' : 'Sector peers'}: ${d.peers.join(', ')}`);
 }

 // News
 if (d.news?.length) {
 lines.push('\n' + (isHe ? 'חדשות אחרונות (3 ימים):' : 'Recent news (3 days):'));
 d.news.forEach(n => lines.push(` • [${n.source}] ${n.headline}`));
 }
 return lines.join('\n');
}


function getLivePrice(symbol) {
 // Read from StockAPI localStorage cache (sp_SYMBOL)
 const variants = [symbol, symbol.replace(':', '-'), symbol.split(':').pop()];
 for (const s of variants) {
 try {
 const raw = localStorage.getItem('sp_' + s);
 if (!raw) continue;
 const { ts, data } = JSON.parse(raw);
 if (Date.now() - ts < 24 * 60 * 60 * 1000) return data; // fresh within 24h
 } catch(e) {}
 }
 return null;
}

 const ret = (initial > 0 && val > 0) ? (((val - initial) / initial) * 100).toFixed(1) : null;
 const retStr = ret ? `, תשואה: ${ret >= 0 ? '+' : ''}${ret}%` : '';
 const monthly = parseFloat(f.monthlyDeposit) || 0;
 const ytd = monthly * monthsElapsed;
 const monthlyStr = monthly > 0 ? `, הפקדה חודשית: ₪${Math.round(monthly).toLocaleString()}, הופקד YTD: ₪${Math.round(ytd).toLocaleString()}` : '';
 lines.push(` • ${f.name} (${f.type || ''}): ₪${Math.round(val).toLocaleString()}, ${tx.feesLabel} ${f.fee || '?'}%${retStr}${monthlyStr}`);
 });
 lines.push(`${tx.totalLabel} ₪${Math.round(totalFunds).toLocaleString()}`);
 }
 const goals = Storage.get('finance_goals') || [];
 if (goals.length) {
 lines.push('\n' + tx.goalsHeader);
 goals.forEach(g => {
 const pct = g.targetAmount > 0 ? Math.round(((g.currentAmount||0)/g.targetAmount)*100) : 0;
 lines.push(` • ${g.name}: ₪${Math.round(g.currentAmount||0).toLocaleString()} / ₪${Math.round(g.targetAmount||0).toLocaleString()} (${pct}%)${g.deadline ? ', ' + tx.deadlineLabel + ': ' + g.deadline : ''}`);
 });
 }
 const bank = Storage.getBankAccounts?.() || [];
 if (bank.length) {
 totalCash = bank.reduce((s, a) => s + (parseFloat(a.balance) || 0), 0);
 lines.push('\n' + tx.bankHeader + ` ₪${Math.round(totalCash).toLocaleString()}`);
 }

 // ── Roll-up summary so the AI doesn't have to compute aggregates ──
 const totalNetWorth = totalStocks + totalFunds + totalCash;
 if (totalNetWorth > 0) {
 const totalReturn = totalCostBasis > 0
 ? (((totalCurrentValue - totalCostBasis) / totalCostBasis) * 100).toFixed(1)
 : null;
 const allocStocks = ((totalStocks / totalNetWorth) * 100).toFixed(0);
 const allocFunds = ((totalFunds / totalNetWorth) * 100).toFixed(0);
 const allocCash = ((totalCash / totalNetWorth) * 100).toFixed(0);
 lines.push(`\n=== סיכום (אגרגציה) ===`);
 lines.push(`שווי נטו כולל: ₪${Math.round(totalNetWorth).toLocaleString()}`);
 lines.push(`חלוקת נכסים: מניות ${allocStocks}% | קרנות ${allocFunds}% | מזומן ${allocCash}%`);
 if (totalReturn != null) lines.push(`תשואה כוללת על תיק המניות: ${totalReturn >= 0 ? '+' : ''}${totalReturn}%`);
 // Available cash to deploy: assume 3-month emergency fund stays put.
 // Heuristic: if user has goals, subtract sum of upcoming targets within 12mo.
 const liquidExcess = Math.max(0, totalCash - 30000); // tunable: leave 30k as emergency
 if (liquidExcess > 1000) {
 lines.push(`כסף פנוי להשקעה (אחרי שמירה על קרן חירום ~₪30K): כ-₪${Math.round(liquidExcess).toLocaleString()}`);
 }
 }
 } catch(e) {}
 return lines.join('\n');
}

// ── Recommendation validation: parse AI response and flag obvious issues ──
// Runs on every assistant message. Returns array of {level, msg} warnings.
function validateRecommendation(text) {
 const warnings = [];
 if (!text || typeof text !== 'string') return warnings;

 // Extract ₪ amounts mentioned in the recommendation
 const amounts = [...text.matchAll(/₪\s*([\d,]+(?:\.\d+)?)/g)]
 .map(m => parseFloat(m[1].replace(/,/g, '')))
 .filter(n => !isNaN(n) && n > 0);

 // 1. Sum of recommendations vs free cash budget
 const budget = getInvestAmount();
 if (budget > 0 && amounts.length >= 2) {
 // Heuristic: pick the 3 LARGEST distinct amounts as "recommendation amounts"
 const sorted = [...amounts].sort((a, b) => b - a).slice(0, 3);
 const total = sorted.reduce((s, n) => s + n, 0);
 if (total > budget * 1.1) {
 warnings.push({ level: 'error',
 msg: `סך ההמלצות (₪${Math.round(total).toLocaleString()}) חורג מהתקציב שהקצבת (₪${Math.round(budget).toLocaleString()}). תפחית בהתאם לפני ביצוע.` });
 }
 // Single recommendation > budget
 if (sorted[0] > budget * 1.05) {
 warnings.push({ level: 'error',
 msg: `המלצה בודדת בגובה ₪${Math.round(sorted[0]).toLocaleString()} גדולה מהתקציב הפנוי (₪${Math.round(budget).toLocaleString()}).` });
 }
 }

 // 2. Tiny amounts (< ₪500) — likely AI miscount
 const tiny = amounts.filter(n => n > 0 && n < 500).length;
 if (tiny >= 2) {
 warnings.push({ level: 'info',
 msg: `כמה המלצות בסכומים זעירים (פחות מ-₪500). זה בדרך כלל לא יעיל בגלל עמלות. ETFs דורשים מינימום ~₪1,000-2,000.` });
 }

 // 3. Unrealistic returns — anything > 30% annual is a red flag
 // Match patterns like "תשואה: 50%" or "expected return: 60%" or "X-Y% שנתי"
 const returnMatches = [...text.matchAll(/(?:תשואה(?:[^%]{0,40})?|return[^%]{0,40}?)(\d{2,3})\s*%/gi)];
 for (const m of returnMatches) {
 const pct = parseInt(m[1], 10);
 if (pct >= 30) {
 warnings.push({ level: 'error',
 msg: `המודל הציע תשואה צפויה של ${pct}% שנתי — זה לא ריאלי. ETFs רחבים: 7-10%/שנה היסטורית. מניה בודדת: 10-25% (לא מובטח).` });
 break;
 }
 }

 // 4. Allocation conflict — if user is already heavy in stocks, flag stock-heavy recs
 try {
 const stockData = Storage.getStocks?.() || { holdings: [] };
 const stocks = stockData.holdings || stockData || [];
 const totalStocks = stocks.reduce((s, x) => s + (parseFloat(x.currentValue) || parseFloat(x.value) || 0), 0);
 const funds = Storage.getMyFunds?.() || [];
 const totalFunds = funds.reduce((s, f) => s + (parseFloat(f.currentValue) || parseFloat(f.balance) || 0), 0);
 const bank = (Storage.getBankAccounts?.() || []).reduce((s, a) => s + (parseFloat(a.balance) || 0), 0);
 const total = totalStocks + totalFunds + bank;
 if (total > 0) {
 const stockPct = (totalStocks / total) * 100;
 // Count stock/ETF mentions in the recommendation
 const stockMentions = (text.match(/\b(ETF|מניה|מניות|VTI|VOO|QQQ|S&P|נאסד[ק"]?|stocks?|equities?)\b/gi) || []).length;
 if (stockPct > 75 && stockMentions >= 3) {
 warnings.push({ level: 'warn',
 msg: `התיק שלך כבר ${stockPct.toFixed(0)}% במניות. ההמלצה עם הרבה מניות תעמיק את חוסר האיזון. שקול אג"ח/REITs/קופת גמל לאיזון.` });
 }
 }
 } catch {}

 return warnings;
}

async function validateTickers(text) {

 // exclude common false positives
 .filter(t => !['ETF', 'AI', 'TA', 'IL', 'US', 'EU', 'YTD', 'EOF', 'API', 'JSON', 'IRA', 'NYSE', 'NASDAQ', 'SP500', 'CDB', 'LCI', 'LCA', 'FII', 'PGBL', 'VGBL'].includes(t))

function markdownToHtml(text) {
 return text
 .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
 .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
 .replace(/\*(.+?)\*/g,'<em>$1</em>')
 .replace(/^#{1,3}\s+(.+)$/gm,'<strong>$1</strong>')
 .replace(/^[-•]\s+(.+)$/gm,'• $1')
 .replace(/\n/g,'<br>');
}

const AI_PROXY_URL = 'https://master-backend-79jx.onrender.com/api/ai-proxy';
const AI_HEALTH_URL = 'https://master-backend-79jx.onrender.com/health';

// Belt-and-suspenders egress lockdown:
//  1. Authorization: Bearer <firebase-id-token>  — backend can verify identity
//     and reject anonymous traffic to this endpoint.
//  2. WizePII.stripIdentity / scrubString — removes emails, ID numbers, phone
//     numbers, and ambiguous person-name fields from the payload before it
//     ever leaves the browser. Domain labels (fund/goal names) are KEPT so
//     the AI answer keeps full accuracy.
async function _postAI(body) {
 const headers = { 'Content-Type': 'application/json' };
 try {
 const u = (typeof firebase !== 'undefined') ? firebase.auth().currentUser : null;
 if (u) {
 const token = await u.getIdToken();
 if (token) headers['Authorization'] = 'Bearer ' + token;
 }
 } catch (e) { /* token fetch failed — let backend reject if it requires auth */ }
 return fetch(AI_PROXY_URL, {
 method: 'POST',
 headers,
 body: JSON.stringify(body),
 });
}

async function aiProxy({ messages, system, maxTokens = 2048, search = false, searchTopic = 'finance' }) {
 let safeMessages = messages;
 let safeSystem = system;
 try {
 if (typeof WizePII !== 'undefined') {
 // messages is an array of {role, parts:[{text}]} — recurse to scrub
 // any free-text email/SSN/CPF patterns inside the user content.
 safeMessages = WizePII.stripIdentity(messages);
 // system is a plain string — apply regex value-pattern scrubbing.
 safeSystem = typeof system === 'string' ? WizePII.scrubString(system) : WizePII.stripIdentity(system);
 }
 } catch (e) { /* fail open — never block the user because of PII helper bugs */ }
 const body = { messages: safeMessages, system: safeSystem, maxTokens };
 if (search) { body.search = true; body.searchTopic = searchTopic; }
 let res = await _postAI(body);

 // Render free tier sleeps after 15 min — auto-retry on 502/503/504 with
 // a /health warm-up so the user doesn't see a cold-start error.
 if ([502, 503, 504].includes(res.status)) {
 const typingEl = document.getElementById('typingIndicator');
 if (typingEl) {
 const lang = (typeof I18n !== 'undefined' && I18n.currentLang) || localStorage.getItem('wl_lang') || 'he';
 const msg = ({
 he: '⏳ רגע אחד, מכין את התשובה…',
 en: '⏳ One moment, getting your answer…',
 pt: '⏳ Um momento, preparando a resposta…',
 es: '⏳ Un momento, preparando la respuesta…',
 })[lang] || '⏳ One moment…';
 typingEl.querySelector('.chat-bubble').innerHTML =
 `<span style="font-size:0.8rem;color:var(--color-text-secondary)">${msg}</span>`;
 }
 try { await fetch(AI_HEALTH_URL, { cache: 'no-store' }); } catch {}
 await new Promise(r => setTimeout(r, 8000));
 res = await _postAI(body);
 if ([502, 503, 504].includes(res.status)) {
 await new Promise(r => setTimeout(r, 12000));
 res = await _postAI(body);
 }
 }

 if (!res.ok) {
 if (res.status === 429) { const e = new Error('rate'); e.code = 'functions/resource-exhausted'; throw e; }
 throw new Error('AI error: ' + res.status);
 }
 const json = await res.json();
 if (json.error) throw new Error(json.error);
 return { data: { text: json.text, sources: json.sources || [], searchUsed: !!json.searchUsed } };
}

 input.focus();
}

 pt: amount > 0 ? `Quero investir ₪${Math.round(amount).toLocaleString()}. Dê 3 recomendações somando exatamente este valor.` : 'Analise minha carteira e dê 3 recomendações.',
 es: amount > 0 ? `Quiero invertir ₪${Math.round(amount).toLocaleString()}. Da 3 recomendaciones que sumen exactamente ese monto.` : 'Analiza mi cartera y da 3 recomendaciones.',
 })[lang] || 'Recommend 3 allocations.';
 document.getElementById('chatInput').value = auto;
 setTimeout(() => { sendMessage(); }, 150);
}

// Compact amount display: "Investing ₪X (auto: bank ₪Y minus ₪30K emergency)"
// with a pencil button that reveals the editable input. AI is given the
// final amount as a hard constraint either way.
function initInvestAmountInput() {
 const summary = document.getElementById('investAmountSummary');
 const editor = document.getElementById('investAmountEditor');
 const editBtn = document.getElementById('editInvestBtn');
 const confirmBtn = document.getElementById('confirmInvestBtn');
 const el = document.getElementById('investAmount');
 if (!summary || !el) return;

 const refresh = () => {
 const amount = getInvestAmount();
 let bank = 0;
 try { bank = (Storage.getBankAccounts?.() || []).reduce((s, a) => s + (parseFloat(a.balance) || 0), 0); } catch {}
 const overridden = parseFloat(localStorage.getItem(INVEST_AMOUNT_KEY)) > 0;
 if (amount > 0) {
 summary.textContent = `משקיע ₪${Math.round(amount).toLocaleString()}` +
 (overridden ? ' (נקבע ידנית)' : (bank > 0 ? ` (אוטו׳: בנק ₪${Math.round(bank).toLocaleString()} פחות ₪30K קרן חירום)` : ''));
 } else {
 summary.textContent = bank > 0
 ? `יש לך ₪${Math.round(bank).toLocaleString()} בבנק. אין כסף פנוי אחרי קרן חירום ₪30K — תוכל לערוך ידנית.`
 : 'אין נתוני בנק. הוסף יתרות בכרטיסיית בנק או ערוך כאן ידנית.';
 }
 el.value = amount > 0 ? Math.round(amount) : '';
 };

 if (editBtn) editBtn.addEventListener('click', () => {
 editor.style.display = 'inline-flex';
 editBtn.style.display = 'none';
 el.focus();
 el.select();
 });
 const closeEditor = () => {
 const v = parseFloat(el.value);
 if (v > 0) setInvestAmount(v);
 editor.style.display = 'none';
 editBtn.style.display = '';
 refresh();
 };
 if (confirmBtn) confirmBtn.addEventListener('click', closeEditor);
 if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); closeEditor(); } });

 refresh();
 // Re-render summary if Storage updates (account balance changes)
 setInterval(refresh, 5000);
}

document.addEventListener('DOMContentLoaded', () => {
 if (typeof I18n !== 'undefined') {
 I18n.init();
 const origSet = I18n.setLanguage?.bind(I18n);
 if (origSet) I18n.setLanguage = lang => { origSet(lang); applyLang(); };
 }
 applyLang();
 loadHistory();
 initInvestAmountInput();
 // First-use disclaimer for the investment advisor — gates auto-analysis until accepted
 if (window.WizeDisclaimer) {
 WizeDisclaimer.gate({ app: 'money' })
 .then(() => setTimeout(() => autoAnalyze(), 800))
 .catch(() => {});
 } else {
 setTimeout(() => autoAnalyze(), 800);
 }
});
</script>
