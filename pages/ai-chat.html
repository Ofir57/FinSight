 // ── Cross-app context (Yolo only) — reads from Firestore ──
 async function fetchCrossAppContext(uid) {
 if (_crossAppData !== null) return _crossAppData;
 const lines = [];
 try {
 const snap = await firebaseDb
 .collection('users').doc(uid)
 .collection('cross_app')
 .get();
 if (snap.empty) {
 _crossAppData = '';
 return '';
 }
 lines.push('\n=== נתונים מכלי WizeLife נוספים ===\n');
 snap.forEach(doc => {
 const d = doc.data();
 const appName = d.appName || doc.id;
 lines.push(`\n── ${appName} ──`);
 if (d.summary) lines.push(d.summary);
 if (d.updatedAt) {
 const ts = d.updatedAt.toDate ? d.updatedAt.toDate() : new Date(d.updatedAt);
 lines.push(`(עודכן: ${ts.toLocaleDateString('he-IL')})`);
 }
 });
 } catch(e) {
 console.warn('cross_app fetch failed:', e);
 }
 _crossAppData = lines.join('\n');
 return _crossAppData;
 }

 // ── Build rich financial context from localStorage ──
 function buildFinancialContext() {
 const lang = (typeof I18n !== 'undefined') ? I18n.current : 'he';
 const isPt = lang === 'pt';
 const isEs = lang === 'es';
 const fmt = n => (typeof I18n !== 'undefined' && I18n.formatCurrency) ? I18n.formatCurrency(n) : '₪' + Math.round(n).toLocaleString('he-IL');

 const L = {
 header: isPt ? '=== Dados financeiros reais do usuário ===' : isEs ? '=== Datos financieros reales del usuario ===' : '=== נתונים פיננסיים אמיתיים של המשתמש ===',
 bank: isPt ? 'Contas bancárias' : isEs ? 'Cuentas bancarias' : 'חשבונות בנק',
 accounts: isPt ? 'contas' : isEs ? 'cuentas' : 'חשבונות',
 balance: isPt ? 'saldo total' : isEs ? 'saldo total' : 'יתרה כוללת',
 stocks: isPt ? 'Ações' : isEs ? 'Acciones' : 'מניות',
 holdings: isPt ? 'posições' : isEs ? 'posiciones' : 'אחזקות',
 value: isPt ? 'valor total' : isEs ? 'valor total' : 'שווי כולל',
 funds: isPt ? 'Fundos / Previdência' : isEs ? 'Fondos / Pensión' : 'קרנות / פנסיה / גמל',
 products: isPt ? 'produtos' : isEs ? 'productos' : 'מוצרים',
 fee: isPt ? 'taxa' : isEs ? 'tarifa' : 'דמי ניהול',
 assets: isPt ? 'Patrimônio' : isEs ? 'Activos' : 'נכסים',
 items: isPt ? 'itens' : isEs ? 'ítems' : 'פריטים',
 loans: isPt ? 'Empréstimos' : isEs ? 'Préstamos' : 'הלוואות',
 monthly: isPt ? 'pagamento mensal' : isEs ? 'pago mensual' : 'תשלום חודשי',
 interest: isPt ? 'juros' : isEs ? 'interés' : 'ריבית',
 subs: isPt ? 'Assinaturas / Pagamentos fixos' : isEs ? 'Suscripciones / Pagos fijos' : 'מנויים / תשלומים קבועים',
 goals: isPt ? 'Metas de poupança' : isEs ? 'Metas de ahorro' : 'יעדי חיסכון',
 networth: isPt ? 'Patrimônio líquido' : isEs ? 'Patrimonio neto' : 'שווי נקי',
 change: isPt ? 'variação mês anterior' : isEs ? 'cambio mes anterior' : 'שינוי מחודש קודם',
 credit: isPt ? 'Cartões de crédito' : isEs ? 'Tarjetas de crédito' : 'כרטיסי אשראי',
 debt: isPt ? 'dívida total' : isEs ? 'deuda total' : 'חוב כולל',
 deadline: isPt ? 'prazo' : isEs ? 'fecha límite' : 'דדליין',
 error: isPt ? '(erro ao carregar alguns dados)' : isEs ? '(error al cargar algunos datos)' : '(שגיאה בטעינת חלק מהנתונים)',
 };

 const lines = [`${L.header}\n`];

 try {
 const bank = Storage.getBankAccounts?.() || Storage.get('finance_bank_accounts') || [];
 if (bank.length) {
 const total = bank.reduce((s, a) => s + (parseFloat(a.balance) || 0), 0);
 lines.push(`**${L.bank}:** ${bank.length} ${L.accounts}, ${L.balance} ${fmt(total)}`);
 bank.forEach(a => lines.push(` • ${a.bankName || a.name || 'Bank'}: ${fmt(parseFloat(a.balance)||0)}`));
 }

 const stocks = Storage.getStocks?.() || Storage.get('finance_stocks') || [];
 if (stocks.length) {
 const total = stocks.reduce((s, x) => s + (parseFloat(x.currentValue) || parseFloat(x.value) || 0), 0);
 lines.push(`\n**${L.stocks}:** ${stocks.length} ${L.holdings}, ${L.value} ${fmt(total)}`);
 stocks.slice(0, 6).forEach(x => lines.push(` • ${x.symbol || x.name}: ${fmt(parseFloat(x.currentValue)||parseFloat(x.value)||0)}`));
 }

 const funds = Storage.getMyFunds?.() || Storage.get('finance_my_funds') || [];
 if (funds.length) {
 const total = funds.reduce((s, f) => s + (parseFloat(f.currentValue) || parseFloat(f.balance) || 0), 0);
 lines.push(`\n**${L.funds}:** ${funds.length} ${L.products}, ${L.value} ${fmt(total)}`);
 funds.forEach(f => lines.push(` • ${f.name} (${f.type||''}): ${fmt(parseFloat(f.currentValue)||parseFloat(f.balance)||0)}, ${L.fee} ${f.fee||'?'}%`));
 }

 const assets = Storage.getAssets?.() || Storage.get('finance_assets') || [];
 if (assets.length) {
 const total = assets.reduce((s, a) => s + (parseFloat(a.value) || 0), 0);
 lines.push(`\n**${L.assets}:** ${assets.length} ${L.items}, ${L.value} ${fmt(total)}`);
 assets.forEach(a => lines.push(` • ${a.name}: ${fmt(parseFloat(a.value)||0)}`));
 }

 const loans = Storage.getLoans?.() || Storage.get('finance_loans') || [];
 if (loans.length) {
 const total = loans.reduce((s, l) => s + (parseFloat(l.remainingBalance) || parseFloat(l.balance) || 0), 0);
 const mTotal = loans.reduce((s, l) => s + (parseFloat(l.monthlyPayment) || 0), 0);
 lines.push(`\n**${L.loans}:** ${loans.length}, ${fmt(total)}, ${L.monthly} ${fmt(mTotal)}`);
 loans.forEach(l => lines.push(` • ${l.name||l.type||L.loans}: ${fmt(parseFloat(l.remainingBalance)||parseFloat(l.balance)||0)}, ${l.interestRate||'?'}% ${L.interest}, ${fmt(parseFloat(l.monthlyPayment)||0)}/mês`));
 }

 const subs = Storage.getSubscriptions?.() || Storage.get('finance_subscriptions') || [];
 if (subs.length) {
 const mTotal = subs.reduce((s, x) => {
 const amt = parseFloat(x.amount) || 0;
 const freq = x.frequency || 'monthly';
 return s + (freq === 'annual' ? amt/12 : freq === 'quarterly' ? amt/3 : freq === 'weekly' ? amt*4.3 : amt);
 }, 0);
 lines.push(`\n**${L.subs}:** ${subs.length} ${L.items}, ~${fmt(Math.round(mTotal))}/mês`);
 subs.forEach(x => lines.push(` • ${x.name}: ${fmt(parseFloat(x.amount)||0)} (${x.frequency||'monthly'})`));
 }

 const goals = Storage.get('finance_goals') || [];
 if (goals.length) {
 lines.push(`\n**${L.goals}:** ${goals.length}`);
 goals.forEach(g => {
 const pct = g.targetAmount > 0 ? Math.round(((g.currentAmount||0)/g.targetAmount)*100) : 0;
 lines.push(` • ${g.name}: ${fmt(g.currentAmount||0)} / ${fmt(g.targetAmount||0)} (${pct}%)${g.deadline ? `, ${L.deadline}: ${g.deadline}` : ''}`);
 });
 }

 const nwHistory = Storage.get('finance_networth_history') || [];
 if (nwHistory.length >= 2) {
 const last = nwHistory[nwHistory.length-1];
 const prev = nwHistory[nwHistory.length-2];
 const delta = last.value - prev.value;
 lines.push(`\n**${L.networth}:** ${fmt(last.value)} (${L.change}: ${delta >= 0 ? '+' : ''}${fmt(delta)})`);
 }

 const credit = Storage.get('finance_credit_cards') || [];
 if (credit.length) {
 const debt = credit.reduce((s, c) => s + (parseFloat(c.balance) || 0), 0);
 lines.push(`\n**${L.credit}:** ${credit.length}, ${L.debt} ${fmt(debt)}`);
 }

 } catch(e) {
 lines.push(`\n${L.error}`);
 }

 return lines.join('\n');
 }

 const prompts = {

 'פרמט תשובות ארוכות עם כותרות ורשימות לקריאות נוחה',

 date: `Data de hoje: ${today}`,
 rules: [

 'Use os dados reais recebidos para dar conselhos precisos e personalizados',

 rules: [

 'Usa los datos reales recibidos para dar consejos precisos y personalizados',
 'Cuando se solicite un cálculo — ejecútalo de verdad',

 ],
 crossNote: 'Tienes acceso a datos de varias herramientas WizeLife — úsalos para una visión financiera completa',
 },
 en: {

 date: `Today: ${today}`,
 rules: [

 const p = prompts[lang] || prompts.en;
 const rules = [...p.rules, ...(crossCtx ? [p.crossNote] : [])].map(r => `- ${r}`).join('\n');

 // Phase 2 RAG-enforcement footer — same across 4 langs (model is multilingual).
 const groundTruthFooter = `

 // ── Chat logic ──
 function renderMessage(role, text) {
 const container = document.getElementById('chatMessages');
 const row = document.createElement('div');
 row.className = `chat-row ${role}`;
 const bubble = document.createElement('div');
 bubble.className = `chat-bubble chat-${role}`;
 bubble.innerHTML = markdownToHtml(text);
 row.appendChild(bubble);
 container.appendChild(row);
 container.scrollTop = container.scrollHeight;
 return bubble;
 }

 function markdownToHtml(text) {
 return text
 .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
 .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
 .replace(/\*(.+?)\*/g, '<em>$1</em>')
 .replace(/^#{1,3}\s+(.+)$/gm, '<strong>$1</strong>')
 .replace(/^[-•]\s+(.+)$/gm, '• $1')
 .replace(/\n/g, '<br>');
 }

 function showTyping() {
 const container = document.getElementById('chatMessages');
 const row = document.createElement('div');
 row.className = 'chat-row assistant';
 row.id = 'typingIndicator';
 row.innerHTML = `<div class="chat-bubble chat-assistant" style="padding:14px 18px;">
 <span class="typing-dot"></span>
 <span class="typing-dot"></span>
 <span class="typing-dot"></span>
 </div>`;
 container.appendChild(row);
 container.scrollTop = container.scrollHeight;
 }

 function removeTyping() {
 document.getElementById('typingIndicator')?.remove();
 }

 let currentUser = null;
 const aiProxy = firebase.functions().httpsCallable('aiProxy');

 async function sendMessage() {
 if (isLoading) return;
 const input = document.getElementById('chatInput');
 const text = input.value.trim();
 if (!text) return;

 if (!currentUser) {
 renderMessage('assistant', I18n.t('chat.errNotLoggedIn'));
 return;
 }

 document.getElementById('suggestions').style.display = 'none';
 input.value = '';
 autoResize(input);
 isLoading = true;
 document.getElementById('sendBtn').style.opacity = '0.5';

 renderMessage('user', text);
 conversationHistory.push({ role: 'user', parts: [{ text }] });

 showTyping();

 try {
 // PII scrubbed (wize-pii.js, contextual) — strips email/phone/ID/address values
 // from the conversation; keeps financial labels (goal/fund/account names) intact.
 const _strip = (window.WizePII?.stripIdentity) || (x => x);
 const _scrub = (window.WizePII?.scrubString) || (x => x);
 const _system = await buildSystemPrompt();
 // Keep history as Gemini format; last message already added above
 const result = await aiProxy({
 messages: _strip(conversationHistory),
 system: typeof _system === 'string' ? _scrub(_system) : _strip(_system),
 });

 removeTyping();
 const reply = result.data.text;
 conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
 renderMessage('assistant', reply);
 saveHistory();
 } catch(e) {
 removeTyping();
 const code = e.code || '';
 if (code === 'functions/unauthenticated') {
 renderMessage('assistant', I18n.t('chat.errUnauthenticated'));
 } else if (code === 'functions/resource-exhausted') {
 renderMessage('assistant', '⏳ ' + (e.message || I18n.t('chat.errRateLimit')));
 } else {
 renderMessage('assistant', I18n.t('chat.errGeneral'));
 }
 }

 isLoading = false;
 document.getElementById('sendBtn').style.opacity = '1';
 input.focus();
 }

 function handleKey(e) {
 if (e.key === 'Enter' && !e.shiftKey) {
 e.preventDefault();
 sendMessage();
 }
 }

 function autoResize(el) {
 el.style.height = 'auto';
 el.style.height = Math.min(el.scrollHeight, 160) + 'px';
 }

 function clearChat() {
 if (!confirm(I18n.t('chat.clearConfirm'))) return;
 conversationHistory = [];
 document.getElementById('chatMessages').innerHTML = '';
 document.getElementById('suggestions').style.display = 'block';
 localStorage.removeItem(CHAT_HISTORY_KEY);
 }

 function saveHistory() {
 try {
 localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(conversationHistory.slice(-40)));
 } catch(e) {}
 }

 function loadHistory() {
 try {
 const saved = localStorage.getItem(CHAT_HISTORY_KEY);
 if (saved) {
 conversationHistory = JSON.parse(saved);
 conversationHistory.forEach(m => {
 const role = m.role === 'model' ? 'assistant' : m.role;
 const text = m.parts?.[0]?.text || m.content || '';
 renderMessage(role, text);
 });
 if (conversationHistory.length > 0) {
 document.getElementById('suggestions').style.display = 'none';
 }
 }
 } catch(e) {}
 }

 function getYoloSuggestions() {
 return [
 I18n.t('chat.yoloSuggest1'),
 I18n.t('chat.yoloSuggest2'),
 I18n.t('chat.yoloSuggest3'),
 I18n.t('chat.yoloSuggest4'),
 ];
 }

 function refreshCrossAppContext() {
 _crossAppData = null;
 const btn = document.getElementById('cross-app-refresh-btn');
 if (btn) { btn.textContent = '✓ מרענן...'; setTimeout(() => { btn.textContent = typeof I18n !== 'undefined' ? I18n.t('chat.refreshContextBtn') : '🔄 רענן קונטקסט'; }, 1500); }
 }

 function updateApiStatus(user) {
 const el = document.getElementById('apiStatus');
 const refreshBtn = document.getElementById('cross-app-refresh-btn');
 if (user) {
 const isYolo = typeof Plan !== 'undefined' && Plan.isYolo();
 el.textContent = isYolo ? '✦ Yolo AI — כל הכלים' : '✓ AI מחובר';
 el.style.background = isYolo ? 'rgba(245,158,11,0.15)' : 'rgba(16,185,129,0.12)';
 el.style.color = isYolo ? '#f59e0b' : '#10b981';
 if (refreshBtn) refreshBtn.style.display = isYolo ? '' : 'none';
 } else {
 el.textContent = '🔒 נדרשת התחברות';
 el.style.background = 'rgba(245,158,11,0.1)';
 el.style.color = '#f59e0b';
 if (refreshBtn) refreshBtn.style.display = 'none';
 }
 }

 // ── Suggestions ──
 function buildSuggestions() {
 const wrap = document.querySelector('#suggestions > div');
 wrap.innerHTML = '';
 const isYolo = typeof Plan !== 'undefined' && Plan.isYolo();
 const list = isYolo ? [...getYoloSuggestions(), ...getSuggestions()] : getSuggestions();
 list.forEach(q => {
 const btn = document.createElement('button');
 btn.className = 'suggestion-chip';
 btn.textContent = q;
 btn.onclick = () => {
 document.getElementById('chatInput').value = q;
 sendMessage();
 };
 wrap.appendChild(btn);
 });
 }

 firebase.auth().onAuthStateChanged(async user => {
 currentUser = user;
 if (user && typeof Plan !== 'undefined') {
 await Plan.load();
 _crossAppData = null; // reset cache on login
 }
 updateApiStatus(user);
 });

 document.addEventListener('DOMContentLoaded', () => {
 if (typeof I18n !== 'undefined') {
 I18n.init();
 // Rebuild suggestions when language changes
 const origSetLang = I18n.setLanguage?.bind(I18n);
 if (origSetLang) {
 I18n.setLanguage = function(lang) {
 origSetLang(lang);
 buildSuggestions();
 };
 }
 }
 buildSuggestions();
 loadHistory();
 });
</script>
<script src="../js/wl-common-i18n.js?v=2" defer></script>
<script src="../js/wl-text-i18n.js?v=2" defer></script>
