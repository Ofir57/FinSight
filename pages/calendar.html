<script>
 const CUSTOM_EVENTS_KEY = 'finance_calendar_events';
 const MONTH_NAMES = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
 const DAY_NAMES = ['א','ב','ג','ד','ה','ו','ש']; // Sun-Sat

 let viewYear = new Date().getFullYear();
 let viewMonth = new Date().getMonth(); // 0-indexed
 const today = new Date();

 // ── Custom events ─────────────────────────────────────────────────
 function getCustomEvents() {
 try { return JSON.parse(localStorage.getItem(CUSTOM_EVENTS_KEY)) || []; }
 catch { return []; }
 }
 function saveCustomEvents(events) {
 localStorage.setItem(CUSTOM_EVENTS_KEY, JSON.stringify(events));
 }

 // ── Build events for a given year/month ──────────────────────────
 function buildEvents(year, month) {
 const events = {}; // day (1-31) → [{type, icon, name, amount, detail}]
 const add = (day, ev) => {
 if (!events[day]) events[day] = [];
 events[day].push(ev);
 };

 const daysInMonth = new Date(year, month + 1, 0).getDate();

 // 1. Subscriptions
 const subs = Storage.getSubscriptions().filter(s => s.active !== false);
 const multipliers = { weekly: 52/12, monthly:1, bimonthly:0.5, quarterly:1/3, semi_annual:1/6, annual:1/12 };
 subs.forEach(s => {
 if (!s.renewalDate) {
 // No specific date — show on the 1st as estimate
 add(1, { type:'subscription', icon:'🔄', name: s.name, amount: s.amount,
 detail: 'חידוש חודשי (תאריך לא ידוע)' });
 return;
 }
 const renewal = new Date(s.renewalDate + 'T00:00:00');
 const freq = s.frequency || 'monthly';

 // Figure out if this sub hits in the current month
 let hits = [];
 if (freq === 'monthly' || freq === 'weekly') {
 const day = renewal.getDate();
 if (day <= daysInMonth) hits.push(day);
 if (freq === 'weekly') {
 // Add every ~7 days
 for (let d = day + 7; d <= daysInMonth; d += 7) hits.push(d);
 // Also add days before if first hit > 7
 for (let d = day - 7; d >= 1; d -= 7) hits.push(d);
 }
 } else if (freq === 'bimonthly') {
 const day = renewal.getDate();
 if (day <= daysInMonth) hits.push(day);
 hits.push(Math.min(day + 15, daysInMonth));
 } else if (freq === 'quarterly' || freq === 'semi_annual' || freq === 'annual') {
 // Check if renewal month matches
 const renewMonth = renewal.getMonth();
 const renewDay = renewal.getDate();
 const monthsDiff = freq === 'quarterly' ? 3 : freq === 'semi_annual' ? 6 : 12;
 // If (viewMonth - renewMonth) % monthsDiff === 0
 const diff = ((month - renewMonth) % monthsDiff + monthsDiff) % monthsDiff;
 if (diff === 0 && renewDay <= daysInMonth) hits.push(renewDay);
 }

 hits.forEach(day => {
 add(day, { type:'subscription', icon:'🔄', name: s.name, amount: s.amount,
 detail: I18n.t('subscriptions.frequencies.' + freq) || freq });
 });
 });

 // 2. Loans — show payment day (default: 1st of month)
 const loans = Storage.getLoans();
 loans.forEach(l => {
 const day = l.paymentDay || 1;
 if (day <= daysInMonth) {
 add(day, { type:'loan', icon:'🏦', name: l.name || l.type || 'הלוואה',
 amount: l.monthlyPayment || 0,
 detail: l.remainingBalance ? 'יתרה: ₪' + Math.round(l.remainingBalance).toLocaleString('he-IL') : '' });
 }
 });

 // 3. Goals with deadline
 const goals = Storage.get('finance_goals') || [];
 goals.forEach(g => {
 if (!g.deadline) return;
 const d = new Date(g.deadline + 'T00:00:00');
 if (d.getFullYear() === year && d.getMonth() === month) {
 add(d.getDate(), { type:'goal', icon: g.icon || '🎯', name: g.name,
 amount: g.targetAmount - (g.currentAmount || 0),
 detail: 'יעד חיסכון — נדרש עוד ₪' + Math.round(g.targetAmount - (g.currentAmount||0)).toLocaleString('he-IL') });
 }
 });

 // 4. Custom events
 const customs = getCustomEvents();
 customs.forEach(ev => {
 const d = new Date(ev.date + 'T00:00:00');
 // Recurring
 let matches = false;
 if (ev.recur === 'monthly') {
 if (d.getDate() <= daysInMonth) { matches = true; }
 } else if (ev.recur === 'annual') {
 if (d.getMonth() === month) { matches = true; }
 } else {
 // one-time
 matches = d.getFullYear() === year && d.getMonth() === month;
 }
 if (matches) {
 const day = ev.recur === 'annual' ? d.getDate() : (ev.recur === 'monthly' ? d.getDate() : d.getDate());
 if (day <= daysInMonth) {
 const typeMap = { salary:'salary', custom:'custom', subscription:'subscription', loan:'loan', goal:'goal' };
 const iconMap = { salary:'💰', custom:'📌', subscription:'🔄', loan:'🏦', goal:'🎯' };
 add(day, { type: typeMap[ev.type] || 'custom', icon: iconMap[ev.type] || '📌',
 name: ev.name, amount: ev.amount || 0, detail: ev.note || '',
 customId: ev.id });
 }
 }
 });

 return events;
 }

 // ── Render calendar ───────────────────────────────────────────────
 function render() {
 document.getElementById('monthTitle').textContent = `${MONTH_NAMES[viewMonth]} ${viewYear}`;

 const events = buildEvents(viewYear, viewMonth);
 const grid = document.getElementById('calGrid');

 // Day headers (Sun=0 … Sat=6, but display RTL: ש to א)
 // Israeli week: ראשון to שבת
 const headers = DAY_NAMES.map(d => `<div class="cal-day-header">${d}'</div>`).join('');

 // First day of month (0=Sun)
 const firstDay = new Date(viewYear, viewMonth, 1).getDay();
 const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
 const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();

 let cells = '';

 // Prev month filler
 for (let i = 0; i < firstDay; i++) {
 const d = daysInPrev - firstDay + 1 + i;
 cells += `<div class="cal-cell other-month"><div class="cal-date">${d}</div></div>`;
 }

 // Current month
 for (let day = 1; day <= daysInMonth; day++) {
 const isToday = day === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();
 const dayEvents = events[day] || [];
 const hasEvents = dayEvents.length > 0;
 const show = dayEvents.slice(0, 3);
 const more = dayEvents.length - show.length;

 const chips = show.map(ev =>
 `<div class="cal-event type-${ev.type}" title="${ev.name}${ev.amount ? ' · ₪'+Math.round(ev.amount).toLocaleString('he-IL') : ''}">${ev.icon} ${ev.name}</div>`
 ).join('');

 const moreEl = more > 0 ? `<div class="cal-more">+${more} נוספים</div>` : '';

 cells += `<div class="cal-cell${isToday ? ' today' : ''}${hasEvents ? ' has-events' : ''}"
 onclick="${hasEvents ? `openDayModal(${day})` : ''}">
 <div class="cal-date">${isToday ? '<span class="today-dot"></span>' : ''}${day}</div>
 <div class="cal-events">${chips}${moreEl}</div>
 </div>`;
 }

 // Next month filler
 const total = firstDay + daysInMonth;
 const nextFiller = total % 7 === 0 ? 0 : 7 - (total % 7);
 for (let i = 1; i <= nextFiller; i++) {
 cells += `<div class="cal-cell other-month"><div class="cal-date">${i}</div></div>`;
 }

 grid.innerHTML = headers + cells;

 renderSummary(events);
 renderUpcoming();
 }

 // ── Sidebar: month summary ────────────────────────────────────────
 function renderSummary(events) {
 let subTotal = 0, loanTotal = 0, customTotal = 0, incomeTotal = 0;

 Object.values(events).forEach(dayEvs => {
 dayEvs.forEach(ev => {
 if (ev.type === 'subscription') subTotal += ev.amount || 0;
 else if (ev.type === 'loan') loanTotal += ev.amount || 0;
 else if (ev.type === 'salary') incomeTotal+= ev.amount || 0;
 else customTotal += ev.amount || 0;
 });
 });

 const fmt = n => '₪' + Math.round(n).toLocaleString('he-IL');
 document.getElementById('sumSubscriptions').textContent = fmt(subTotal);
 document.getElementById('sumLoans').textContent = fmt(loanTotal);
 document.getElementById('sumCustom').textContent = fmt(customTotal);
 document.getElementById('sumIncome').textContent = fmt(incomeTotal);
 document.getElementById('sumTotal').textContent = fmt(subTotal + loanTotal + customTotal);
 }

 // ── Sidebar: upcoming events (next 14 days) ───────────────────────
 function renderUpcoming() {
 const list = document.getElementById('upcomingList');
 const now = new Date();
 const upcoming = [];

 // Build events for this month AND next month to catch near-future events
 for (let m = 0; m <= 1; m++) {
 let y = now.getFullYear(), mo = now.getMonth() + m;
 if (mo > 11) { mo -= 12; y++; }
 const evs = buildEvents(y, mo);
 Object.entries(evs).forEach(([day, dayEvs]) => {
 const d = new Date(y, mo, parseInt(day));
 const diff = Math.ceil((d - now) / 86400000);
 if (diff >= 0 && diff <= 30) {
 dayEvs.forEach(ev => {
 upcoming.push({ ...ev, date: d, diff });
 });
 }
 });
 }

 upcoming.sort((a, b) => a.diff - b.diff);
 const shown = upcoming.slice(0, 8);

 if (shown.length === 0) {
 list.innerHTML = `<div style="color:var(--color-text-secondary);font-size:0.82rem;padding:8px 0;">${I18n.t('cal.noUpcoming')}</div>`;
 return;
 }

 const colorMap = { subscription:'#06b6d4', loan:'#ef4444', goal:'#10b981', salary:'#f59e0b', custom:'#8b5cf6' };

 const _s = (v) => (window.sanitize ? window.sanitize(v) : String(v == null ? '' : v).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])));
 list.innerHTML = shown.map(ev => {
 const dateStr = ev.diff === 0 ? I18n.t('cal.today') : ev.diff === 1 ? I18n.t('cal.tomorrow') : `${I18n.t('cal.inDays1')}${ev.diff}${I18n.t('cal.inDays2')}`;
 const isUrgent = ev.diff <= 3;
 const day = ev.date.getDate();
 const mon = MONTH_NAMES[ev.date.getMonth()];
 return `<div class="upcoming-item">
 <div class="upcoming-dot" style="background:${colorMap[ev.type] || '#8b5cf6'}"></div>
 <div class="upcoming-info">
 <div class="upcoming-name">${_s(ev.icon)} ${_s(ev.name)}</div>
 <div class="upcoming-date">${day} ${mon} ${ev.date.getFullYear()}</div>
 </div>
 <div style="text-align:left;">
 ${isUrgent ? `<div class="upcoming-soon">⚡ ${dateStr}</div>` : `<div style="font-size:0.7rem;color:var(--color-text-secondary);">${dateStr}</div>`}
 ${ev.amount ? `<div class="upcoming-amount" style="color:${colorMap[ev.type]}">₪${Math.round(Number(ev.amount) || 0).toLocaleString('he-IL')}</div>` : ''}
 </div>
 </div>`;
 }).join('');
 }

 // ── Day modal ────────────────────────────────────────────────────
 function openDayModal(day) {
 const events = buildEvents(viewYear, viewMonth);
 const dayEvs = events[day] || [];
 const dateStr = `${day} ${MONTH_NAMES[viewMonth]} ${viewYear}`;

 document.getElementById('dayModalTitle').textContent = '📅 ' + dateStr;

 const colorMap = { subscription:'#06b6d4', loan:'#ef4444', goal:'#10b981', salary:'#f59e0b', custom:'#8b5cf6' };

 const _s = (v) => (window.sanitize ? window.sanitize(v) : String(v == null ? '' : v).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])));
 document.getElementById('dayModalEvents').innerHTML = dayEvs.map(ev => `
 <div class="day-event-item">
 <div class="day-event-icon">${_s(ev.icon)}</div>
 <div style="flex:1">
 <div class="day-event-name">${_s(ev.name)}</div>
 ${ev.detail ? `<div class="day-event-detail">${_s(ev.detail)}</div>` : ''}
 </div>
 ${ev.amount ? `<div class="day-event-amount" style="color:${colorMap[ev.type]}">₪${Math.round(Number(ev.amount) || 0).toLocaleString('he-IL')}</div>` : ''}
 </div>
 `).join('');

 document.getElementById('dayModal').classList.add('active');
 }

 function closeDayModal(e) {
 if (e && e.target !== document.getElementById('dayModal')) return;
 document.getElementById('dayModal').classList.remove('active');
 }

 // ── Add custom event modal ────────────────────────────────────────
 function openAddModal() {
 const todayStr = new Date().toISOString().split('T')[0];
 document.getElementById('evtDate').value = todayStr;
 document.getElementById('evtName').value = '';
 document.getElementById('evtAmount').value = '';
 document.getElementById('evtNote').value = '';
 document.getElementById('addModal').classList.add('active');
 }

 function closeAddModal(e) {
 if (e && e.target !== document.getElementById('addModal')) return;
 document.getElementById('addModal').classList.remove('active');
 }

 function saveCustomEvent() {
 const name = document.getElementById('evtName').value.trim();
 const date = document.getElementById('evtDate').value;
 const amount = parseFloat(document.getElementById('evtAmount').value) || 0;
 const type = document.getElementById('evtType').value;
 const recur = document.getElementById('evtRecur').value;
 const note = document.getElementById('evtNote').value.trim();

 if (!name || !date) { alert(I18n.t('cal.fillNameDate')); return; }

 const events = getCustomEvents();
 events.push({ id: 'ev_' + Date.now(), name, date, amount, type, recur, note });
 saveCustomEvents(events);
 closeAddModal();
 render();

 if (typeof App !== 'undefined' && App.notify) App.notify(I18n.t('cal.eventSaved'), 'success');
 }

 // ── Month navigation ──────────────────────────────────────────────
 function changeMonth(delta) {
 viewMonth += delta;
 if (viewMonth > 11) { viewMonth = 0; viewYear++; }
 if (viewMonth < 0) { viewMonth = 11; viewYear--; }
 render();
 }

 // ── Init ──────────────────────────────────────────────────────────
 document.addEventListener('DOMContentLoaded', () => {
 App.currentPage = 'calendar';
 I18n.init();
 render();
 });
</script>
