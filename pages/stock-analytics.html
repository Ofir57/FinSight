 <script>
 // ── Helpers ────────────────────────────────────────────────────────────────
 const fmt = n => '₪' + Math.abs(n).toLocaleString('he-IL', { maximumFractionDigits: 0 });
 const fmtPct = n => (n >= 0 ? '+' : '') + n.toFixed(1) + '%';

 function getHoldingValue(h) {
 return h.valueILS > 0 ? h.valueILS : h.quantity * (h.currentPrice || h.avgPrice || 0);
 }
 function getHoldingProfit(h) {
 if (h.profitILS != null) return h.profitILS;
 const cost = h.quantity * (h.avgPrice || 0);
 const val = getHoldingValue(h);
 return val - cost;
 }
 function getProfitPct(h) {
 const cost = h.quantity * (h.avgPrice || 0);
 if (!cost) return 0;
 return (getHoldingProfit(h) / cost) * 100;
 }

 // ── Sector Map ─────────────────────────────────────────────────────────────
 // Keys: symbol → sector key (used to look up translated label and color)
 const SECTOR_KEY_MAP = {
 AAPL:'tech', MSFT:'tech', GOOGL:'tech', GOOG:'tech',
 META:'tech', AMZN:'tech', NVDA:'tech', TSLA:'tech',
 NFLX:'tech', AMD:'tech', INTC:'tech', CRM:'tech',
 JPM:'finance', GS:'finance', BAC:'finance', WFC:'finance', BRK:'finance',
 JNJ:'health', PFE:'health', UNH:'health', ABBV:'health',
 XOM:'energy', CVX:'energy',
 TEVA:'pharma', NICE:'tech', CHECK:'tech', CYBR:'tech',
 ESLT:'defense', ELBIT:'defense', IAI:'defense',
 POLI:'insurance', MIGDAL:'insurance', HAREL:'insurance',
 HAPO:'banking', LUMI:'banking', MIZR:'banking', FIBI:'banking',
 DSCT:'banking', MZTF:'banking',
 };

 function getSectorLabel(key) {
 const map = {
 tech: I18n.t('analytics.sectorTech'),
 finance: I18n.t('analytics.sectorFinance'),
 health: I18n.t('analytics.sectorHealth'),
 energy: I18n.t('analytics.sectorEnergy'),
 pharma: I18n.t('analytics.sectorPharma'),
 defense: I18n.t('analytics.sectorDefense'),
 insurance: I18n.t('analytics.sectorInsurance'),
 banking: I18n.t('analytics.sectorBanking'),
 other: I18n.t('analytics.sectorOther'),
 };
 return map[key] || map.other;
 }

 // Sector colors (keyed by sector key)
 const SECTOR_COLORS = {
 tech: { bg: 'rgba(99,102,241,0.15)', border: 'rgba(99,102,241,0.5)', text: '#818cf8' },
 finance: { bg: 'rgba(16,185,129,0.12)', border: 'rgba(16,185,129,0.4)', text: '#34d399' },
 health: { bg: 'rgba(236,72,153,0.12)', border: 'rgba(236,72,153,0.4)', text: '#f472b6' },
 energy: { bg: 'rgba(245,158,11,0.12)', border: 'rgba(245,158,11,0.4)', text: '#fbbf24' },
 pharma: { bg: 'rgba(59,130,246,0.12)', border: 'rgba(59,130,246,0.4)', text: '#60a5fa' },
 defense: { bg: 'rgba(239,68,68,0.12)', border: 'rgba(239,68,68,0.4)', text: '#f87171' },
 insurance: { bg: 'rgba(20,184,166,0.12)', border: 'rgba(20,184,166,0.4)', text: '#2dd4bf' },
 banking: { bg: 'rgba(168,85,247,0.12)', border: 'rgba(168,85,247,0.4)', text: '#c084fc' },
 other: { bg: 'rgba(148,163,184,0.1)', border: 'rgba(148,163,184,0.3)', text: '#94a3b8' },
 };

 // Pie chart colors palette
 const PIE_COLORS = [
 '#8b5cf6','#6366f1','#3b82f6','#06b6d4','#10b981',
 '#84cc16','#f59e0b','#ef4444','#ec4899','#f97316',
 '#14b8a6','#a855f7','#0ea5e9','#22c55e','#eab308',
 ];

 // ── Main Render ─────────────────────────────────────────────────────────────
 async function renderAnalytics() {
 const root = document.getElementById('analytics-root');

 let stockData;
 try {
 stockData = await Storage.getStocks();
 } catch(e) {
 stockData = null;
 }

 const holdings = (stockData && stockData.holdings) ? stockData.holdings : [];

 if (!holdings.length) {
 root.innerHTML = renderEmptyState();
 return;
 }

 // Pre-compute values for all holdings
 const enriched = holdings.map(h => ({
 ...h,
 _value: getHoldingValue(h),
 _profit: getHoldingProfit(h),
 _pct: getProfitPct(h),
 }));

 const totalValue = enriched.reduce((s, h) => s + h._value, 0);
 const totalProfit = enriched.reduce((s, h) => s + h._profit, 0);
 const totalCost = totalValue - totalProfit;
 const totalPct = totalCost > 0 ? (totalProfit / totalCost) * 100 : 0;
 const losers = enriched.filter(h => h._profit < 0);
 const winners = enriched.filter(h => h._profit >= 0);

 const bestH = enriched.reduce((a, b) => b._pct > a._pct ? b : a, enriched[0]);
 const worstH = enriched.reduce((a, b) => b._pct < a._pct ? b : a, enriched[0]);
 const avgPct = enriched.reduce((s, h) => s + h._pct, 0) / enriched.length;
 const winRate = enriched.length ? (winners.length / enriched.length) * 100 : 0;

 root.innerHTML = `
 ${renderSummaryBar(totalValue, totalProfit, totalPct, enriched)}
 ${renderPerfRow(bestH, worstH, winRate, avgPct)}
 ${renderHoldingsTable(enriched, totalValue)}
 ${renderCharts()}
 ${renderSectorSection(enriched, totalValue)}
 ${losers.length ? renderTaxHarvest(losers) : ''}
 `;

 // Draw charts after DOM is ready
 drawPieChart(enriched, totalValue);
 drawBarChart(enriched);
 }

 // ── Section: Summary Bar ───────────────────────────────────────────────────
 function renderSummaryBar(totalValue, totalProfit, totalPct, enriched) {
 const profitClass = totalProfit >= 0 ? 'positive' : 'negative';
 const sign = totalProfit >= 0 ? '+' : '-';
 const bestH = enriched.reduce((a, b) => b._pct > a._pct ? b : a, enriched[0]);

 return `
 <div class="portfolio-summary-bar">
 <div class="summary-metric">
 <div class="label">${I18n.t('analytics.totalValue')}</div>
 <div class="value">${fmt(totalValue)}</div>
 <div class="sub">${enriched.length} ${I18n.t('analytics.holdings')}</div>
 </div>
 <div class="summary-metric">
 <div class="label">${I18n.t('analytics.totalProfitLoss')}</div>
 <div class="value ${profitClass}">${sign}${fmt(totalProfit)}</div>
 <div class="sub">${fmtPct(totalPct)}</div>
 </div>
 <div class="summary-metric">
 <div class="label">${I18n.t('analytics.holdingsCount')}</div>
 <div class="value">${enriched.length}</div>
 <div class="sub">${enriched.filter(h => h._profit >= 0).length} ${I18n.t('analytics.inProfit')} · ${enriched.filter(h => h._profit < 0).length} ${I18n.t('analytics.inLoss')}</div>
 </div>
 <div class="summary-metric">
 <div class="label">${I18n.t('analytics.bestPerformer')}</div>
 <div class="value positive">${bestH.symbol}</div>
 <div class="sub">${fmtPct(bestH._pct)}</div>
 </div>
 </div>`;
 }

 // ── Section: Performance Stats Row ────────────────────────────────────────
 function renderPerfRow(bestH, worstH, winRate, avgPct) {
 return `
 <div class="perf-row">
 <div class="perf-card">
 <div class="perf-icon">🏆</div>
 <div class="perf-label">${I18n.t('analytics.bestPerformer')}</div>
 <div class="perf-value text-positive">${fmtPct(bestH._pct)}</div>
 <div class="perf-sub">${bestH.name || bestH.symbol}</div>
 </div>
 <div class="perf-card">
 <div class="perf-icon">📉</div>
 <div class="perf-label">${I18n.t('analytics.worstPerformer')}</div>
 <div class="perf-value text-negative">${fmtPct(worstH._pct)}</div>
 <div class="perf-sub">${worstH.name || worstH.symbol}</div>
 </div>
 <div class="perf-card">
 <div class="perf-icon">🎯</div>
 <div class="perf-label">${I18n.t('analytics.winRate')}</div>
 <div class="perf-value ${winRate >= 50 ? 'text-positive' : 'text-negative'}">${winRate.toFixed(0)}%</div>
 <div class="perf-sub">${I18n.t('analytics.holdingsInProfit')}</div>
 </div>
 <div class="perf-card">
 <div class="perf-icon">📊</div>
 <div class="perf-label">${I18n.t('analytics.avgPL')}</div>
 <div class="perf-value ${avgPct >= 0 ? 'text-positive' : 'text-negative'}">${fmtPct(avgPct)}</div>
 <div class="perf-sub">${I18n.t('analytics.perHolding')}</div>
 </div>
 </div>`;
 }

 // ── Section: Holdings Table ────────────────────────────────────────────────
 function renderHoldingsTable(enriched, totalValue) {
 const rows = enriched.map(h => {
 const pClass = h._profit >= 0 ? 'text-positive' : 'text-negative';
 const hasPrice = h.currentPrice && h.avgPrice;
 const curPriceDisplay = hasPrice
 ? '₪' + (h.currentPrice).toLocaleString('he-IL', { maximumFractionDigits: 2 })
 : '<span class="text-muted">—</span>';
 const avgPriceDisplay = h.avgPrice
 ? '₪' + (h.avgPrice).toLocaleString('he-IL', { maximumFractionDigits: 2 })
 : '<span class="text-muted">—</span>';
 const pct = (totalValue > 0) ? ((h._value / totalValue) * 100).toFixed(1) : '0.0';
 const harvestBadge = h._profit < 0
 ? `<div><span class="harvest-badge">⚠ מימוש הפסד?</span></div>`
 : '';

 return `
 <tr>
 <td>
 <div class="holding-symbol">${h.symbol}</div>
 <div class="holding-name">${h.name || ''}</div>
 ${harvestBadge}
 </td>
 <td>${(h.quantity || 0).toLocaleString('he-IL', { maximumFractionDigits: 4 })}</td>
 <td>${avgPriceDisplay}</td>
 <td>${curPriceDisplay}</td>
 <td>
 <div style="font-weight:600;">${fmt(h._value)}</div>
 <div class="text-muted" style="font-size:11px;">${pct}%</div>
 </td>
 <td class="${pClass}">${h._profit >= 0 ? '+' : '-'}${fmt(h._profit)}</td>
 <td class="${pClass}">${fmtPct(h._pct)}</td>
 </tr>`;
 }).join('');

 return `
 <div class="holdings-table-wrap">
 <div class="card-header">
 <span>📋</span>
 <span>${I18n.t('analytics.holdingsTable')}</span>
 </div>
 <div style="overflow-x:auto;">
 <table class="holdings-table">
 <thead>
 <tr>
 <th>${I18n.t('analytics.colSymbol')}</th>
 <th>${I18n.t('analytics.colQty')}</th>
 <th>${I18n.t('analytics.colAvgPrice')}</th>
 <th>${I18n.t('analytics.colCurPrice')}</th>
 <th>${I18n.t('analytics.colValue')}</th>
 <th>${I18n.t('analytics.colPLils')}</th>
 <th>${I18n.t('analytics.colPLpct')}</th>
 </tr>
 </thead>
 <tbody>${rows}</tbody>
 </table>
 </div>
 </div>`;
 }

 // ── Section: Charts placeholder ────────────────────────────────────────────
 function renderCharts() {
 return `
 <div class="charts-row">
 <div class="chart-card">
 <h3><span>🥧</span> ${I18n.t('analytics.pieChartTitle')}</h3>
 <div class="chart-container">
 <canvas id="pieChart"></canvas>
 </div>
 </div>
 <div class="chart-card">
 <h3><span>📊</span> ${I18n.t('analytics.barChartTitle')}</h3>
 <div class="chart-container">
 <canvas id="barChart"></canvas>
 </div>
 </div>
 </div>`;
 }

 // ── Draw Pie Chart ─────────────────────────────────────────────────────────
 function drawPieChart(enriched, totalValue) {
 const ctx = document.getElementById('pieChart');
 if (!ctx) return;

 const labels = enriched.map(h => h.symbol);
 const data = enriched.map(h => h._value);
 const colors = enriched.map((_, i) => PIE_COLORS[i % PIE_COLORS.length]);

 new Chart(ctx, {
 type: 'doughnut',
 data: {
 labels,
 datasets: [{
 data,
 backgroundColor: colors.map(c => c + 'cc'),
 borderColor: colors,
 borderWidth: 2,
 hoverOffset: 8,
 }]
 },
 options: {
 responsive: true,
 maintainAspectRatio: false,
 cutout: '60%',
 plugins: {
 legend: {
 position: 'bottom',
 rtl: true,
 labels: {
 color: '#94a3b8',
 font: { size: 11 },
 padding: 10,
 usePointStyle: true,
 pointStyleWidth: 10,
 }
 },
 tooltip: {
 rtl: true,
 callbacks: {
 label: ctx => {
 const val = ctx.raw;
 const pct = totalValue > 0 ? ((val / totalValue) * 100).toFixed(1) : 0;
 return ` ${fmt(val)} (${pct}%)`;
 }
 }
 }
 }
 }
 });
 }

 // ── Draw Bar Chart ─────────────────────────────────────────────────────────
 function drawBarChart(enriched) {
 const ctx = document.getElementById('barChart');
 if (!ctx) return;

 const labels = enriched.map(h => h.symbol);
 const data = enriched.map(h => h._profit);
 const bgColors = data.map(v => v >= 0 ? 'rgba(16,185,129,0.7)' : 'rgba(239,68,68,0.7)');
 const bdColors = data.map(v => v >= 0 ? '#10b981' : '#ef4444');

 new Chart(ctx, {
 type: 'bar',
 data: {
 labels,
 datasets: [{
 label: I18n.t('analytics.barChartLabel'),
 data,
 backgroundColor: bgColors,
 borderColor: bdColors,
 borderWidth: 1,
 borderRadius: 6,
 }]
 },
 options: {
 responsive: true,
 maintainAspectRatio: false,
 indexAxis: enriched.length > 8 ? 'y' : 'x',
 plugins: {
 legend: { display: false },
 tooltip: {
 rtl: true,
 callbacks: {
 label: ctx => {
 const v = ctx.raw;
 return ` ${v >= 0 ? '+' : '-'}${fmt(v)}`;
 }
 }
 }
 },
 scales: {
 x: {
 ticks: { color: '#94a3b8', font: { size: 11 } },
 grid: { color: 'rgba(255,255,255,0.05)' },
 },
 y: {
 ticks: {
 color: '#94a3b8',
 font: { size: 11 },
 callback: v => v === 0 ? '0' : (v >= 0 ? '+' : '-') + '₪' + Math.abs(v).toLocaleString('he-IL', { maximumFractionDigits: 0 }),
 },
 grid: { color: 'rgba(255,255,255,0.05)' },
 }
 }
 }
 });
 }

 // ── Section: Sector Allocation ─────────────────────────────────────────────
 function renderSectorSection(enriched, totalValue) {
 // Aggregate by sector key
 const sectorMap = {};
 enriched.forEach(h => {
 const key = SECTOR_KEY_MAP[h.symbol] || 'other';
 if (!sectorMap[key]) sectorMap[key] = 0;
 sectorMap[key] += h._value;
 });

 const pills = Object.entries(sectorMap)
 .sort((a, b) => b[1] - a[1])
 .map(([key, value]) => {
 const pct = totalValue > 0 ? ((value / totalValue) * 100).toFixed(1) : 0;
 const col = SECTOR_COLORS[key] || SECTOR_COLORS['other'];
 const label = getSectorLabel(key);
 return `
 <div class="sector-pill" style="background:${col.bg}; border-color:${col.border};">
 <div class="sector-name" style="color:${col.text};">${label}</div>
 <div class="sector-value">${fmt(value)}</div>
 <div class="sector-pct" style="color:${col.text};">${pct}%</div>
 </div>`;
 }).join('');

 return `
 <div class="sector-card">
 <h3><span>🏭</span> ${I18n.t('analytics.sectorTitle')}</h3>
 <div class="sector-pills">${pills}</div>
 </div>`;
 }

 // ── Section: Tax Harvesting ────────────────────────────────────────────────
 function renderTaxHarvest(losers) {
 const items = losers.map(h => {
 const loss = Math.abs(h._profit);
 const saving = loss * 0.25;
 return `
 <div class="harvest-item">
 <div>
 <div class="harvest-symbol">${h.symbol} ${h.name ? '· ' + h.name : ''}</div>
 <div style="font-size:12px; color:var(--color-text-secondary); margin-top:3px;">
 ${I18n.t('analytics.unrealizedLoss')}
 </div>
 </div>
 <div style="text-align:left;">
 <div class="harvest-loss">-${fmt(loss)}</div>
 <div class="harvest-saving">${I18n.t('analytics.taxSaving')}: ${fmt(saving)}</div>
 </div>
 </div>`;
 }).join('');

 return `
 <div class="tax-harvest-box">
 <div class="harvest-header">
 <span>⚠️</span>
 <span>${I18n.t('analytics.harvestTitle')}</span>
 </div>
 ${items}
 <div class="harvest-tip">
 💡 ${I18n.t('analytics.harvestTip')}
 </div>
 </div>`;
 }

 // ── Empty State ────────────────────────────────────────────────────────────
 function renderEmptyState() {
 return `
 <div class="empty-state">
 <div class="empty-icon">📈</div>
 <h2>${I18n.t('analytics.emptyTitle')}</h2>
 <p>${I18n.t('analytics.emptyDesc')}</p>
 <a href="stocks.html">
 <span>➕</span>
 <span>${I18n.t('analytics.emptyLink')}</span>
 </a>
 </div>`;
 }

 // ── Bootstrap ──────────────────────────────────────────────────────────────
 document.addEventListener('DOMContentLoaded', () => {
 I18n.init();
 // Wait briefly for Storage to init if needed
 if (typeof Storage !== 'undefined' && typeof Storage.getStocks === 'function') {
 renderAnalytics();
 } else {
 // Poll briefly
 let tries = 0;
 const poll = setInterval(() => {
 tries++;
 if (typeof Storage !== 'undefined' && typeof Storage.getStocks === 'function') {
 clearInterval(poll);
 renderAnalytics();
 } else if (tries > 20) {
 clearInterval(poll);
 document.getElementById('analytics-root').innerHTML = renderEmptyState();
 }
 }, 100);
 }
 });
 </script>
<script src="../js/wl-common-i18n.js?v=2" defer></script>
<script src="../js/wl-text-i18n.js?v=2" defer></script>
